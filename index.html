<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = 'https://kmojqsmfefplfkdkuahy.supabase.co'
const SUPABASE_KEY = 'sb_publishable_wQ9M9NiTljrd3W__mMsT0Q_IUMKrWFr'
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
window.supabase = supabase

const STAGES = ['New Lead','Contacted','Pitched','Agreed','Scheduled','Webinar Done','Closed','Not Interested']
const TERMINAL_STAGES = ['Closed','Webinar Done','Not Interested']
const ACTIVITY_TYPES = ['Call','Email','WhatsApp','Meeting','Other']
const PAGE_SIZE = 50
const STAGE_STYLES = {
  'New Lead':       'background:#F5F5F4; color:#44403C; border-color:#E7E5E4',
  'Contacted':      'background:#DBEAFE; color:#1E3A8A; border-color:#BFDBFE',
  'Pitched':        'background:#E0E7FF; color:#3730A3; border-color:#C7D2FE',
  'Agreed':         'background:#D1FAE5; color:#065F46; border-color:#A7F3D0',
  'Scheduled':      'background:#FEF3C7; color:#92400E; border-color:#FDE68A',
  'Webinar Done':   'background:#BBF7D0; color:#14532D; border-color:#86EFAC',
  'Closed':         'background:#E7E5E4; color:#1C1917; border-color:#D6D3D1',
  'Not Interested': 'background:#FEE2E2; color:#991B1B; border-color:#FECACA',
}
const ACTIVITY_TYPE_COLORS = {
  'Call':     { border:'#3B82F6', dot:'bg-blue-500' },
  'Email':    { border:'#6366F1', dot:'bg-indigo-500' },
  'WhatsApp': { border:'#10B981', dot:'bg-emerald-500' },
  'Meeting':  { border:'#A855F7', dot:'bg-purple-500' },
  'Other':    { border:'#78716C', dot:'bg-stone-500' },
}
const AVATAR_COLORS = ['bg-rose-500','bg-amber-500','bg-emerald-500','bg-cyan-500','bg-indigo-500','bg-fuchsia-500','bg-orange-500','bg-teal-500','bg-violet-500','bg-pink-500','bg-sky-500','bg-lime-600']

const state = {
  session: null, profile: null, view: 'loading',
  schools: [], schoolsTotal: 0, schoolsPage: 1,
  filters: { search:'', stage:'', ownerId:'', mineOnly:false },
  selectedSchoolIds: new Set(),
  currentSchool: null, activities: [], editingSchool: false,
  users: [], schoolCountsByOwner: {},
  followUps: [], followUpsCompleting: null,
  dashboardData: null,
  auditLog: [], auditLogOpen: false,
  exporting: false,
  saving: false, flash: null, bulkPanel: null,
  chartInstances: {},
}

function esc(s) {
  if (s === null || s === undefined) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
function fmtDate(iso) {
  if (!iso) return ''
  const d = new Date(iso); if (isNaN(d)) return ''
  const now = new Date()
  if (d.toDateString() === now.toDateString()) return 'Today ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
  const days = Math.floor((now - d) / 86400000)
  if (days === 1) return 'Yesterday'
  if (days >= 2 && days < 7) return days + ' days ago'
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function fmtDateOnly(iso) {
  if (!iso) return ''
  const d = new Date(iso); if (isNaN(d)) return ''
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function todayYMD() { return new Date().toISOString().slice(0,10) }
function stagePill(stage) {
  const style = STAGE_STYLES[stage] || STAGE_STYLES['New Lead']
  return '<span class="stage-pill" style="' + style + '">' + esc(stage) + '</span>'
}
function userById(id) { return state.users.find(u => u.user_id === id) }
function userName(id) { const u = userById(id); return u ? (u.full_name || u.email) : null }
function userInitials(name) {
  if (!name) return '?'
  const parts = name.split(/\s+/).filter(Boolean)
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase()
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
}
function userColor(id) {
  if (!id) return 'bg-stone-400'
  let h = 0; for (let i = 0; i < id.length; i++) h = (h*31 + id.charCodeAt(i)) >>> 0
  return AVATAR_COLORS[h % AVATAR_COLORS.length]
}
function avatar(id, size = 'sm') {
  const u = userById(id)
  const name = u?.full_name || u?.email || ''
  const sizes = { xs:'w-5 h-5 text-[10px]', sm:'w-6 h-6 text-[11px]', md:'w-8 h-8 text-xs', lg:'w-10 h-10 text-sm' }
  return '<div class="' + sizes[size] + ' ' + userColor(id) + ' rounded-full flex items-center justify-center font-semibold text-white shrink-0" title="' + esc(name) + '">' + esc(userInitials(name)) + '</div>'
}
function avatarWithName(id) {
  const name = userName(id)
  if (!name) return '<span class="text-stone-400 text-xs">Unassigned</span>'
  return '<div class="flex items-center gap-2">' + avatar(id) + '<span class="text-sm text-stone-700 truncate">' + esc(name) + '</span></div>'
}
function isAdmin() { return state.profile?.role === 'admin' }
function canEditSchool(s) { return isAdmin() || (s && s.owner_user_id === state.session?.user?.id) }
function flash(kind, msg) { state.flash = { kind, msg }; render(); setTimeout(() => { state.flash = null; render() }, 3500) }

async function loadProfile() {
  const { data } = await supabase.from('user_profiles').select('user_id,email,full_name,role').eq('user_id', state.session.user.id).single()
  state.profile = data
}
async function loadUsers() {
  const { data } = await supabase.from('user_profiles').select('user_id,email,full_name,role,created_at').order('full_name', { nullsFirst:false })
  state.users = data || []
}
async function loadSchoolCountsByOwner() {
  const { data } = await supabase.from('schools').select('owner_user_id').not('owner_user_id','is',null)
  const counts = {}
  for (const r of data || []) counts[r.owner_user_id] = (counts[r.owner_user_id] || 0) + 1
  state.schoolCountsByOwner = counts
}
async function loadSchools() {
  const offset = (state.schoolsPage - 1) * PAGE_SIZE
  let q = supabase.from('schools')
    .select('school_profile_id,school_name,city,state,current_stage,owner_user_id,last_activity_at', { count:'exact' })
    .order('school_name').range(offset, offset + PAGE_SIZE - 1)
  if (state.filters.search) {
    const s = state.filters.search.replace(/[%_]/g,'')
    q = q.or('school_name.ilike.%' + s + '%,city.ilike.%' + s + '%,state.ilike.%' + s + '%')
  }
  if (state.filters.stage) q = q.eq('current_stage', state.filters.stage)
  if (state.filters.mineOnly) q = q.eq('owner_user_id', state.session.user.id)
  else if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
  else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
  const { data, count, error } = await q
  if (error) { flash('err', error.message); return }
  state.schools = data || []
  state.schoolsTotal = count || 0
}
async function loadSchool(id) {
  const { data, error } = await supabase.from('schools').select('*').eq('school_profile_id', id).single()
  if (error) { flash('err', 'Could not load that school'); state.currentSchool = null; return }
  state.currentSchool = data
}
async function loadActivities(id) {
  const { data } = await supabase.from('activities').select('*').eq('school_profile_id', id).order('created_at', { ascending:false }).limit(100)
  state.activities = data || []
}
async function loadFollowUps() {
  const sevenAhead = new Date(Date.now() + 7*86400000).toISOString().slice(0,10)
  const { data, error } = await supabase.from('activities')
    .select('*, school:schools(school_profile_id,school_name,city,state,current_stage)')
    .eq('user_id', state.session.user.id)
    .is('completed_at', null)
    .not('scheduled_for','is',null)
    .lte('scheduled_for', sevenAhead)
    .order('scheduled_for', { ascending:true })
  if (error) { flash('err', error.message); return }
  state.followUps = data || []
}

async function loadDashboard() {
  const { data, error } = await supabase.rpc('dashboard_data')
  if (error) { flash('err', error.message); return }
  state.dashboardData = data || null
}

async function loadAuditLog(schoolId) {
  const { data, error } = await supabase.from('audit_log')
    .select('*')
    .eq('table_name', 'schools').eq('record_id', schoolId)
    .order('changed_at', { ascending: false }).limit(200)
  if (error) { console.error('loadAuditLog', error); return }
  state.auditLog = data || []
}

async function exportSchoolsCsv() {
  if (state.exporting) return
  state.exporting = true; render()
  // Paginate through filtered schools (Supabase max ~1000 per request)
  const all = []
  const pageSize = 1000
  let from = 0
  while (true) {
    let q = supabase.from('schools')
      .select('school_profile_id,school_name,school_type,address,pin_code,city,state,country,email,phone_no,curriculum_followed,school_fees,school_fees_range,poc1_designation,poc1_email,poc1_name,poc1_number,poc2_designation,poc2_email,poc2_name,poc2_number,owner_user_id,current_stage,last_activity_at')
      .order('school_name').range(from, from + pageSize - 1)
    if (state.filters.search) {
      const s = state.filters.search.replace(/[%_]/g,'')
      q = q.or('school_name.ilike.%' + s + '%,city.ilike.%' + s + '%,state.ilike.%' + s + '%')
    }
    if (state.filters.stage) q = q.eq('current_stage', state.filters.stage)
    if (state.filters.mineOnly) q = q.eq('owner_user_id', state.session.user.id)
    else if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
    else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
    const { data, error } = await q
    if (error) { state.exporting = false; flash('err', error.message); render(); return }
    all.push(...(data || []))
    if (!data || data.length < pageSize) break
    from += pageSize
  }
  // Build CSV
  const headers = ['ID','School name','Type','Address','Pin code','City','State','Country','Email','Phone','Curriculum','Fees','Fees range','POC1 designation','POC1 email','POC1 name','POC1 phone','POC2 designation','POC2 email','POC2 name','POC2 phone','Owner','Stage','Last activity']
  const csvEsc = (v) => {
    if (v === null || v === undefined) return ''
    const s = String(v)
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s
  }
  const lines = [headers.map(csvEsc).join(',')]
  for (const r of all) {
    lines.push([
      r.school_profile_id, r.school_name, r.school_type, r.address, r.pin_code, r.city, r.state, r.country,
      r.email, r.phone_no, r.curriculum_followed, r.school_fees, r.school_fees_range,
      r.poc1_designation, r.poc1_email, r.poc1_name, r.poc1_number,
      r.poc2_designation, r.poc2_email, r.poc2_name, r.poc2_number,
      userName(r.owner_user_id) || '', r.current_stage, r.last_activity_at || ''
    ].map(csvEsc).join(','))
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = 'schools-' + new Date().toISOString().slice(0,10) + '.csv'
  a.click()
  URL.revokeObjectURL(url)
  state.exporting = false; flash('ok', 'Exported ' + all.length + ' rows'); render()
}

async function login() {
  const { error } = await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin + window.location.pathname } })
  if (error) flash('err', error.message)
}
async function logout() { await supabase.auth.signOut(); window.location.hash = '' }

async function submitActivity(form) {
  if (state.saving) return
  const newStage = form.new_stage.value || null
  const completed = form.completed.checked
  const scheduledFor = form.scheduled_for.value || null
  const activityType = form.activity_type.value
  const stageNow = newStage || state.currentSchool.current_stage
  const stageIsTerminal = TERMINAL_STAGES.includes(stageNow)

  // ENFORCE: completing an activity on a non-terminal school requires scheduling a next follow-up
  if (completed && !stageIsTerminal && !scheduledFor) {
    flash('err', 'Schedule the next follow-up date, or move stage to Closed / Webinar Done / Not Interested.')
    return
  }

  state.saving = true; render()

  // 1. Insert the primary activity row
  const primary = {
    school_profile_id: state.currentSchool.school_profile_id,
    user_id: state.session.user.id,
    activity_type: activityType,
    outcome: form.outcome.value.trim() || null,
    notes: form.notes.value.trim() || null,
    scheduled_for: scheduledFor,
    completed_at: completed ? new Date().toISOString() : null,
    stage_at_time: stageNow,
  }
  const { error: insErr } = await supabase.from('activities').insert(primary)
  if (insErr) { state.saving = false; flash('err', insErr.message); render(); return }

  // 2. If this activity was completed (i.e., agent actually did something),
  //    auto-close any existing pending follow-up tasks for this school by this user.
  //    A pending task = same school, same user, completed_at null, scheduled_for not null.
  if (completed) {
    await supabase.from('activities')
      .update({ completed_at: new Date().toISOString(), outcome: 'Closed by ' + activityType + ' activity' })
      .eq('school_profile_id', state.currentSchool.school_profile_id)
      .eq('user_id', state.session.user.id)
      .is('completed_at', null)
      .not('scheduled_for', 'is', null)
  }

  // 3. If the activity was completed AND a next follow-up date is set,
  //    create a new pending task. (Unless stage is terminal — then no more tasks.)
  if (completed && scheduledFor && !stageIsTerminal) {
    const followUp = {
      school_profile_id: state.currentSchool.school_profile_id,
      user_id: state.session.user.id,
      activity_type: activityType,
      outcome: null,
      notes: 'Follow-up scheduled from ' + fmtDateOnly(new Date().toISOString()),
      scheduled_for: scheduledFor,
      completed_at: null,
      stage_at_time: stageNow,
    }
    await supabase.from('activities').insert(followUp)
  }

  // 4. If stage changed, update the school
  if (newStage && newStage !== state.currentSchool.current_stage) {
    await supabase.from('schools').update({ current_stage: newStage }).eq('school_profile_id', state.currentSchool.school_profile_id)
  }

  await Promise.all([
    loadSchool(state.currentSchool.school_profile_id),
    loadActivities(state.currentSchool.school_profile_id),
    loadFollowUps(),
  ])
  state.saving = false
  flash('ok', stageIsTerminal && completed ? 'Activity logged · school marked ' + stageNow : 'Activity logged')
  render()
}

async function saveSchoolEdits(form) {
  if (state.saving) return
  state.saving = true; render()
  const fields = ['school_name','school_type','address','pin_code','city','state','country','email','phone_no','curriculum_followed','school_fees','school_fees_range','poc1_designation','poc1_email','poc1_name','poc1_number','poc2_designation','poc2_email','poc2_name','poc2_number']
  const patch = {}
  fields.forEach(f => { const v = form[f]?.value?.trim(); patch[f] = v === '' ? null : v })
  const { error } = await supabase.from('schools').update(patch).eq('school_profile_id', state.currentSchool.school_profile_id)
  state.saving = false
  if (error) { flash('err', error.message); render(); return }
  state.editingSchool = false
  await loadSchool(state.currentSchool.school_profile_id)
  flash('ok', 'School updated'); render()
}

async function reassignOwner(newOwnerId) {
  if (!isAdmin()) return
  const { error } = await supabase.from('schools').update({ owner_user_id: newOwnerId || null }).eq('school_profile_id', state.currentSchool.school_profile_id)
  if (error) { flash('err', error.message); return }
  await loadSchool(state.currentSchool.school_profile_id); flash('ok','Owner updated'); render()
}
async function takeOwnership() {
  const { error } = await supabase.from('schools').update({ owner_user_id: state.session.user.id }).eq('school_profile_id', state.currentSchool.school_profile_id)
  if (error) { flash('err', error.message); return }
  await loadSchool(state.currentSchool.school_profile_id); flash('ok','You now own this school'); render()
}
async function submitNewSchool(form) {
  if (state.saving) return
  state.saving = true; render()
  const row = {}
  const fields = ['school_profile_id','school_name','school_type','address','pin_code','city','state','country','email','phone_no','curriculum_followed','school_fees','school_fees_range','poc1_designation','poc1_email','poc1_name','poc1_number','poc2_designation','poc2_email','poc2_name','poc2_number']
  fields.forEach(f => { const v = form[f]?.value?.trim(); if (v) row[f] = v })
  row.created_by = state.session.user.id
  row.owner_user_id = state.session.user.id
  const { error } = await supabase.from('schools').insert(row)
  state.saving = false
  if (error) { flash('err', error.message); render(); return }
  flash('ok','School added')
  window.location.hash = '#/schools/' + encodeURIComponent(row.school_profile_id)
}

async function bulkReassign(newOwnerId) {
  if (!isAdmin()) return
  const ids = Array.from(state.selectedSchoolIds)
  if (ids.length === 0) return
  const { error } = await supabase.from('schools').update({ owner_user_id: newOwnerId || null }).in('school_profile_id', ids)
  if (error) { flash('err', error.message); return }
  flash('ok', 'Reassigned ' + ids.length + ' school' + (ids.length===1?'':'s'))
  state.selectedSchoolIds.clear(); state.bulkPanel = null
  await Promise.all([loadSchools(), loadSchoolCountsByOwner()])
  render()
}
async function bulkDelete() {
  if (!isAdmin()) return
  const ids = Array.from(state.selectedSchoolIds)
  if (ids.length === 0) return
  const { error } = await supabase.from('schools').delete().in('school_profile_id', ids)
  if (error) { flash('err', error.message); return }
  flash('ok', 'Deleted ' + ids.length + ' school' + (ids.length===1?'':'s'))
  state.selectedSchoolIds.clear(); state.bulkPanel = null
  await Promise.all([loadSchools(), loadSchoolCountsByOwner()])
  render()
}

async function completeFollowUp(activityId, form) {
  const outcome = form.outcome.value.trim() || null
  const additional = form.notes.value.trim()
  const fu = state.followUps.find(f => f.id === Number(activityId))
  const mergedNotes = additional ? (fu?.notes ? fu.notes + '\n\n— ' + additional : additional) : fu?.notes || null
  const { error } = await supabase.from('activities').update({ completed_at: new Date().toISOString(), outcome, notes: mergedNotes }).eq('id', Number(activityId))
  if (error) { flash('err', error.message); return }
  flash('ok', 'Marked complete'); state.followUpsCompleting = null
  await loadFollowUps(); render()
}

async function setUserRole(userId, newRole) {
  if (!isAdmin()) return
  if (userId === state.session.user.id) { flash('err','You cannot change your own role.'); return }
  const { error } = await supabase.from('user_profiles').update({ role: newRole }).eq('user_id', userId)
  if (error) { flash('err', error.message); return }
  flash('ok','Role updated'); await loadUsers(); render()
}

function render() {
  const root = document.getElementById('app')
  let html = ''
  if (state.view === 'loading') html = renderLoading()
  else if (!state.session) html = renderLogin()
  else html = renderShell()
  root.innerHTML = html
  attachHandlers()
}
function renderLoading() { return '<div class="min-h-screen flex items-center justify-center text-stone-500">Loading…</div>' }

function renderLogin() {
  return '<div class="min-h-screen flex items-center justify-center px-4">' +
    '<div class="max-w-sm w-full">' +
      '<div class="mb-8">' +
        '<div class="text-xs font-semibold tracking-widest uppercase mb-3 gradient-text">BrightChamps · Partnerships</div>' +
        '<h1 class="text-3xl font-semibold tracking-tight text-stone-900 mb-2">Webinar CRM</h1>' +
        '<p class="text-sm text-stone-500">Sign in with your brightchamps.com account to continue.</p>' +
      '</div>' +
      '<button data-action="login" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition focus-ring flex items-center justify-center gap-2">Sign in with Google</button>' +
      '<p class="text-xs text-stone-400 mt-6">Access restricted to brightchamps.com Workspace.</p>' +
    '</div></div>'
}

function renderShell() {
  const content = renderCurrentView()
  const flashHtml = state.flash ? '<div class="fixed top-6 right-6 z-50 px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium ' + (state.flash.kind === 'ok' ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white') + '">' + esc(state.flash.msg) + '</div>' : ''
  return flashHtml + '<div class="min-h-screen flex">' + renderSidebar() + '<div class="flex-1 ml-60 flex flex-col"><header class="border-b border-stone-200 bg-white"><div class="px-8 py-3 flex items-center justify-between max-w-[1400px] w-full"><div class="text-sm text-stone-500">' + renderBreadcrumb() + '</div><div class="flex items-center gap-3"><a href="#/schools/new" class="text-sm bg-stone-900 hover:bg-stone-800 text-white px-3 py-1.5 rounded-md font-medium transition">+ Add school</a></div></div></header><main class="flex-1 px-8 py-6 max-w-[1400px] w-full">' + content + '</main></div></div>'
}

function renderSidebar() {
  const hash = window.location.hash.slice(1) || '/'
  const onSchools = hash === '/' || (hash.startsWith('/schools') && !hash.includes('/new'))
  const onFollow = hash === '/follow-ups'
  const onTeam = hash === '/team'
  const onDash = hash === '/dashboard'
  const item = (label, href, active, badge) => '<a href="' + href + '" class="flex items-center justify-between px-3 py-2 rounded-md text-sm transition ' + (active ? 'bg-indigo-500/15 text-white font-medium' : 'text-stone-300 hover:bg-stone-800/50 hover:text-white') + '"><span>' + esc(label) + '</span>' + (badge || '') + '</a>'
  const overdueCount = state.followUps.filter(f => f.scheduled_for && f.scheduled_for < todayYMD()).length
  const followBadge = overdueCount > 0 ? '<span class="bg-rose-500 text-white text-[10px] font-semibold px-1.5 py-0.5 rounded-full">' + overdueCount + '</span>' : ''
  return '<aside class="fixed left-0 top-[3px] bottom-0 w-60 bg-stone-900 text-stone-100 px-4 py-5 flex flex-col"><div class="px-3 mb-6"><div class="text-[10px] font-semibold tracking-widest uppercase gradient-text">BrightChamps</div><div class="text-base font-semibold text-white mt-0.5">Webinar CRM</div></div><nav class="space-y-1 flex-1">' + item('Schools','#/schools', onSchools) + item('My follow-ups','#/follow-ups', onFollow, followBadge) + item('Dashboard','#/dashboard', onDash) + (isAdmin() ? item('Team','#/team', onTeam) : '') + '</nav><div class="border-t border-stone-800 pt-3 px-2"><div class="flex items-center gap-2.5">' + avatar(state.session.user.id, 'md') + '<div class="min-w-0 flex-1"><div class="text-xs text-stone-100 truncate font-medium">' + esc(state.profile?.full_name || state.session.user.email) + '</div><div class="text-[10px] font-semibold uppercase tracking-wider ' + (isAdmin() ? 'text-indigo-300' : 'text-stone-400') + '">' + (isAdmin() ? 'Admin' : 'Agent') + '</div></div></div><button data-action="logout" class="mt-2 w-full text-xs text-stone-400 hover:text-white text-left px-1">Sign out</button></div></aside>'
}

function renderBreadcrumb() {
  const hash = window.location.hash.slice(1) || '/'
  if (hash === '/schools/new') return '<a href="#/schools" class="hover:text-stone-900">Schools</a> <span class="text-stone-300">/</span> <span class="text-stone-900">Add school</span>'
  if (hash.startsWith('/schools/') && state.currentSchool) return '<a href="#/schools" class="hover:text-stone-900">Schools</a> <span class="text-stone-300">/</span> <span class="text-stone-900">' + esc(state.currentSchool.school_name) + '</span>'
  if (hash === '/follow-ups') return '<span class="text-stone-900">My follow-ups</span>'
  if (hash === '/team') return '<span class="text-stone-900">Team</span>'
  if (hash === '/dashboard') return '<span class="text-stone-900">Dashboard</span>'
  return '<span class="text-stone-900">Schools</span>'
}

function renderCurrentView() {
  switch (state.view) {
    case 'schools-list': return renderSchoolsList()
    case 'school-detail': return renderSchoolDetail()
    case 'school-new': return renderSchoolNew()
    case 'follow-ups': return renderFollowUps()
    case 'team': return renderTeam()
    case 'dashboard': return renderDashboard()
    default: return renderSchoolsList()
  }
}

function renderSchoolsList() {
  const totalPages = Math.max(1, Math.ceil(state.schoolsTotal / PAGE_SIZE))
  const page = state.schoolsPage
  const start = (page-1)*PAGE_SIZE + 1
  const end = Math.min(page*PAGE_SIZE, state.schoolsTotal)
  const userOptions = state.users.map(u => '<option value="' + esc(u.user_id) + '"' + (state.filters.ownerId === u.user_id ? ' selected' : '') + '>' + esc(u.full_name || u.email) + '</option>').join('')
  const allPageIds = state.schools.map(s => s.school_profile_id)
  const allSelected = allPageIds.length > 0 && allPageIds.every(id => state.selectedSchoolIds.has(id))
  const someSelected = !allSelected && allPageIds.some(id => state.selectedSchoolIds.has(id))

  const rows = state.schools.length === 0
    ? '<tr><td colspan="7" class="text-center text-stone-400 py-12 text-sm">No schools match these filters.</td></tr>'
    : state.schools.map(s => {
      const selected = state.selectedSchoolIds.has(s.school_profile_id)
      return '<tr class="hover:bg-stone-50 border-b border-stone-100' + (selected ? ' bg-indigo-50/40' : '') + '" data-action="open-school" data-id="' + esc(s.school_profile_id) + '"><td class="py-2 px-4 w-10" data-no-row-click><input type="checkbox" id="cb-' + esc(s.school_profile_id) + '" class="row-checkbox sr-only" data-action="toggle-select" data-id="' + esc(s.school_profile_id) + '"' + (selected ? ' checked' : '') + '><label for="cb-' + esc(s.school_profile_id) + '" class="cursor-pointer block" data-no-row-click><span class="check-box inline-block w-4 h-4 rounded border border-stone-300 hover:border-indigo-400 transition align-middle"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></label></td><td class="py-3 px-3 font-mono text-xs text-stone-400">' + esc(s.school_profile_id) + '</td><td class="py-3 px-4"><div class="font-medium text-stone-900">' + esc(s.school_name) + '</div><div class="text-xs text-stone-500">' + esc([s.city, s.state].filter(Boolean).join(', ')) + '</div></td><td class="py-3 px-4">' + stagePill(s.current_stage) + '</td><td class="py-3 px-4">' + avatarWithName(s.owner_user_id) + '</td><td class="py-3 px-4 text-sm text-stone-500">' + esc(fmtDate(s.last_activity_at) || 'No activity') + '</td><td class="py-3 px-4 text-right text-stone-300">›</td></tr>'
    }).join('')

  const selectedCount = state.selectedSchoolIds.size
  const filtersActive = state.filters.search || state.filters.stage || state.filters.ownerId || state.filters.mineOnly

  return '<div class="mb-5 flex items-end justify-between"><div><h1 class="text-xl font-semibold tracking-tight text-stone-900">Schools</h1><p class="text-sm text-stone-500 mt-0.5">' + state.schoolsTotal.toLocaleString() + ' ' + (state.filters.mineOnly ? 'assigned to you' : 'total') + '. Click a row to open.</p></div><button data-action="export-csv"' + (state.exporting ? ' disabled' : '') + ' class="text-sm border border-stone-300 hover:border-stone-400 hover:bg-stone-50 disabled:opacity-50 px-3 py-1.5 rounded-md text-stone-700 transition">' + (state.exporting ? 'Exporting…' : '↓ Export CSV') + '</button></div><div class="bg-white border border-stone-200 rounded-lg overflow-hidden"><div class="px-4 py-3 border-b border-stone-200 flex flex-wrap gap-2 items-center"><input type="text" placeholder="Search by name, city, state…" value="' + esc(state.filters.search) + '" class="flex-1 min-w-[200px] text-sm px-3 py-1.5 border border-stone-200 rounded-md focus-ring focus:border-indigo-300" data-action="filter-search-input"><select class="text-sm px-3 py-1.5 border border-stone-200 rounded-md bg-white focus-ring" data-action="filter-stage-change"><option value="">All stages</option>' + STAGES.map(s => '<option value="' + esc(s) + '"' + (state.filters.stage === s ? ' selected' : '') + '>' + esc(s) + '</option>').join('') + '</select><select class="text-sm px-3 py-1.5 border border-stone-200 rounded-md bg-white focus-ring' + (state.filters.mineOnly ? ' opacity-40 pointer-events-none' : '') + '" data-action="filter-owner-change"><option value="">All owners</option><option value="unassigned"' + (state.filters.ownerId === 'unassigned' ? ' selected' : '') + '>Unassigned</option>' + userOptions + '</select><button data-action="toggle-mine" class="text-sm px-3 py-1.5 rounded-md border transition ' + (state.filters.mineOnly ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-stone-200 text-stone-700 hover:bg-stone-50') + '">Mine only</button>' + (filtersActive ? '<button data-action="clear-filters" class="text-xs text-stone-500 hover:text-stone-900 px-2">Clear</button>' : '') + '</div><table class="w-full"><thead class="bg-stone-50 border-b border-stone-200"><tr class="text-left text-xs font-medium text-stone-500 uppercase tracking-wider"><th class="py-2 px-4 w-10"><input type="checkbox" id="cb-all" class="row-checkbox sr-only" data-action="toggle-select-all"' + (allSelected ? ' checked' : '') + '><label for="cb-all" class="cursor-pointer block"><span class="check-box inline-block w-4 h-4 rounded border ' + (someSelected ? 'bg-indigo-100 border-indigo-300' : 'border-stone-300') + ' hover:border-indigo-400 transition align-middle"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></label></th><th class="py-2.5 px-3">ID</th><th class="py-2.5 px-4">School</th><th class="py-2.5 px-4">Stage</th><th class="py-2.5 px-4">Owner</th><th class="py-2.5 px-4">Last activity</th><th class="py-2.5 px-4"></th></tr></thead><tbody>' + rows + '</tbody></table>' + (state.schoolsTotal > PAGE_SIZE ? '<div class="px-4 py-3 border-t border-stone-200 flex items-center justify-between text-sm text-stone-500"><div>' + start.toLocaleString() + '–' + end.toLocaleString() + ' of ' + state.schoolsTotal.toLocaleString() + '</div><div class="flex items-center gap-2"><button data-action="page-prev"' + (page === 1 ? ' disabled' : '') + ' class="px-2.5 py-1 border border-stone-200 rounded hover:bg-stone-50 disabled:opacity-30 disabled:cursor-not-allowed">‹</button><span>Page ' + page + ' of ' + totalPages.toLocaleString() + '</span><button data-action="page-next"' + (page >= totalPages ? ' disabled' : '') + ' class="px-2.5 py-1 border border-stone-200 rounded hover:bg-stone-50 disabled:opacity-30 disabled:cursor-not-allowed">›</button></div></div>' : '') + '</div>' + (selectedCount > 0 ? renderBulkBar(selectedCount) : '')
}

function renderBulkBar(count) {
  const userOptions = state.users.map(u => '<option value="' + esc(u.user_id) + '">' + esc(u.full_name || u.email) + '</option>').join('')
  const modal = state.bulkPanel === 'delete-confirm' ? '<div class="fixed inset-0 bg-stone-900/60 z-50 flex items-center justify-center px-4" data-action="close-modal"><div class="bg-white rounded-lg max-w-md w-full p-6"><h3 class="text-lg font-semibold text-stone-900 mb-2">Delete ' + count + ' school' + (count===1?'':'s') + '?</h3><p class="text-sm text-stone-600 mb-4">This cannot be undone. All activities logged against these schools will also be deleted. The deletion will be visible in the audit log.</p><p class="text-xs text-stone-500 mb-2">Type <span class="font-mono text-stone-900 font-medium">delete ' + count + '</span> to confirm:</p><input type="text" data-action="bulk-delete-input" placeholder="delete ' + count + '" class="w-full text-sm px-3 py-2 border border-stone-300 rounded-md focus-ring mb-4"><div class="flex items-center justify-end gap-2"><button data-action="cancel-bulk" class="text-sm text-stone-600 hover:text-stone-900 px-3 py-1.5">Cancel</button><button data-action="bulk-delete-execute" id="bulk-delete-execute" disabled class="bg-rose-600 hover:bg-rose-700 disabled:bg-rose-300 disabled:cursor-not-allowed text-white text-sm font-medium px-3 py-1.5 rounded-md">Delete ' + count + '</button></div></div></div>' : ''
  return '<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 bg-stone-900 text-white rounded-xl shadow-2xl px-4 py-3 flex items-center gap-4 max-w-2xl border border-stone-700"><div class="text-sm"><span class="font-semibold">' + count + '</span> selected</div><div class="w-px h-6 bg-stone-700"></div>' + (isAdmin() ? '<div class="flex items-center gap-2"><label class="text-xs text-stone-400">Reassign to</label><select data-action="bulk-reassign-change" class="bg-stone-800 border border-stone-700 rounded-md text-sm px-2.5 py-1 focus-ring"><option value="">— pick agent —</option><option value="UNASSIGN">Unassigned</option>' + userOptions + '</select></div><button data-action="bulk-delete-confirm" class="text-sm text-rose-300 hover:text-rose-100 hover:bg-rose-900/40 px-2.5 py-1 rounded-md">Delete</button>' : '<div class="text-xs text-stone-400 italic">Only admins can reassign or delete</div>') + '<button data-action="clear-selection" class="text-stone-400 hover:text-white text-sm ml-auto">Clear</button></div>' + modal
}

function renderSchoolDetail() {
  const s = state.currentSchool
  if (!s) return '<div class="text-stone-500 text-sm">School not found. <a href="#/schools" class="text-indigo-600 hover:underline">Back to list</a></div>'
  const editable = canEditSchool(s)
  const ownerName = userName(s.owner_user_id)

  const activityItems = state.activities.length === 0
    ? '<div class="text-sm text-stone-400 py-8 text-center">No activities logged yet. Use the form on the left to log the first one.</div>'
    : state.activities.map(a => {
      const who = userName(a.user_id) || 'Unknown'
      const typeStyle = ACTIVITY_TYPE_COLORS[a.activity_type] || ACTIVITY_TYPE_COLORS['Other']
      const isPending = !a.completed_at
      const when = a.completed_at ? fmtDate(a.completed_at) : (a.scheduled_for ? 'Scheduled for ' + fmtDateOnly(a.scheduled_for) : fmtDate(a.created_at))
      return '<div class="py-3 pl-4 mb-2 border-l-2' + (isPending ? ' bg-amber-50/30' : '') + '" style="border-left-color: ' + (isPending ? '#FBBF24' : typeStyle.border) + '"><div class="flex items-center justify-between flex-wrap gap-2"><div class="flex items-center gap-2"><span class="inline-flex items-center gap-1.5 text-xs font-semibold text-stone-800"><span class="w-1.5 h-1.5 rounded-full ' + typeStyle.dot + '"></span>' + esc(a.activity_type) + '</span>' + (isPending ? '<span class="text-[10px] font-semibold uppercase tracking-wider text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded">Pending</span>' : '') + (a.stage_at_time && a.stage_at_time !== s.current_stage ? '<span class="text-xs text-stone-400">→ ' + esc(a.stage_at_time) + '</span>' : '') + '</div><div class="text-xs text-stone-400 flex items-center gap-2">' + avatar(a.user_id, 'xs') + '<span>' + esc(when) + '</span></div></div>' + (a.outcome ? '<div class="text-sm text-stone-800 mt-1.5">' + esc(a.outcome) + '</div>' : '') + (a.notes ? '<div class="text-sm text-stone-600 mt-1 whitespace-pre-wrap">' + esc(a.notes) + '</div>' : '') + (a.scheduled_for && a.completed_at ? '<div class="text-xs text-stone-400 mt-1">Follow-up planned: ' + esc(fmtDateOnly(a.scheduled_for)) + '</div>' : '') + '</div>'
    }).join('')

  const userOpts = state.users.map(u => '<option value="' + esc(u.user_id) + '"' + (s.owner_user_id === u.user_id ? ' selected' : '') + '>' + esc(u.full_name || u.email) + '</option>').join('')

  const ownerSlot = s.owner_user_id
    ? '<div class="flex items-center gap-2">' + avatar(s.owner_user_id) + '<span class="text-xs text-stone-600">' + esc(ownerName) + '</span></div>'
    : '<button data-action="take-ownership" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium border border-indigo-200 hover:border-indigo-400 px-2.5 py-1 rounded-md">Take ownership</button>'

  // Find any pending follow-up for current user on this school
  const myPending = state.activities.find(a => !a.completed_at && a.scheduled_for && a.user_id === state.session.user.id)
  let banner = ''
  if (myPending) {
    const today = todayYMD()
    const isOverdue = myPending.scheduled_for < today
    const isTodaysTask = myPending.scheduled_for === today
    const tone = isOverdue ? { bg: 'bg-rose-50', bd: 'border-rose-200', tx: 'text-rose-700', icon: '⚠' }
                : isTodaysTask ? { bg: 'bg-amber-50', bd: 'border-amber-200', tx: 'text-amber-800', icon: '⏰' }
                : { bg: 'bg-indigo-50', bd: 'border-indigo-200', tx: 'text-indigo-700', icon: '📌' }
    const label = isOverdue ? 'Overdue follow-up' : (isTodaysTask ? 'Follow-up due today' : 'Follow-up scheduled')
    banner = '<div class="mb-4 ' + tone.bg + ' border ' + tone.bd + ' rounded-lg px-4 py-3 flex items-center gap-3"><span class="text-base">' + tone.icon + '</span><div class="text-sm flex-1"><span class="' + tone.tx + ' font-semibold">' + label + ':</span> <span class="text-stone-700">' + esc(myPending.activity_type) + ' on ' + esc(fmtDateOnly(myPending.scheduled_for)) + '</span></div><div class="text-xs text-stone-500">Log the activity to close this task →</div></div>'
  }

  return banner + '<div class="mb-5 flex items-start justify-between gap-4 flex-wrap"><div><div class="text-xs text-stone-400 font-mono mb-1">ID ' + esc(s.school_profile_id) + '</div><h1 class="text-2xl font-semibold tracking-tight text-stone-900">' + esc(s.school_name) + '</h1><div class="text-sm text-stone-500 mt-1">' + esc([s.city, s.state, s.country].filter(Boolean).join(', ')) + '</div></div><div class="flex items-center gap-3 flex-wrap justify-end">' + stagePill(s.current_stage) + ownerSlot + '</div></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-1 space-y-6">' + renderActivityForm(s) + (isAdmin() ? renderAdminPanel(userOpts) : '') + '</div><div class="lg:col-span-2 space-y-6">' + (state.editingSchool ? renderSchoolEditForm(s) : renderSchoolFields(s, editable)) + '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Activity timeline <span class="text-stone-400 font-normal">(' + state.activities.length + ')</span></h2></header><div class="p-4">' + activityItems + '</div></section>' + renderAuditLogSection(s) + '</div></div>'
}

function renderActivityForm(s) {
  const isTerminal = TERMINAL_STAGES.includes(s.current_stage)
  const hint = isTerminal
    ? '<div class="text-xs text-stone-500 italic">This school is in a terminal stage. Logged activities won\'t schedule new follow-ups.</div>'
    : '<div class="text-xs text-stone-500 italic">Schedule a next follow-up date, or move to Closed / Webinar Done / Not Interested.</div>'
  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Log activity</h2></header><form data-action="submit-activity" class="p-4 space-y-3"><div><label class="block text-xs font-medium text-stone-600 mb-1">Type</label><select name="activity_type" required class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring">' + ACTIVITY_TYPES.map(t => '<option>' + esc(t) + '</option>').join('') + '</select></div><div><label class="block text-xs font-medium text-stone-600 mb-1">Outcome <span class="text-stone-400 font-normal">(short)</span></label><input type="text" name="outcome" placeholder="e.g., Spoke to principal" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"></div><div><label class="block text-xs font-medium text-stone-600 mb-1">Notes</label><textarea name="notes" rows="3" placeholder="Details, next steps…" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring resize-none"></textarea></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-xs font-medium text-stone-600 mb-1">Move stage to</label><select name="new_stage" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">Keep current</option>' + STAGES.map(st => '<option value="' + esc(st) + '"' + (st === s.current_stage ? ' disabled' : '') + '>' + esc(st) + '</option>').join('') + '</select></div><div><label class="block text-xs font-medium text-stone-600 mb-1">Next follow-up</label><input type="date" name="scheduled_for" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"></div></div><label class="flex items-center gap-2 text-xs text-stone-600"><input type="checkbox" name="completed" checked class="rounded focus-ring">This already happened (mark completed)</label>' + hint + '<button type="submit"' + (state.saving ? ' disabled' : '') + ' class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white text-sm font-medium py-2 rounded-md transition">' + (state.saving ? 'Saving…' : 'Log activity') + '</button></form></section>'
}

function renderAdminPanel(userOpts) {
  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Admin</h2></header><div class="p-4 space-y-3"><div><label class="block text-xs font-medium text-stone-600 mb-1">Reassign owner</label><select data-action="reassign-owner" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">Unassigned</option>' + userOpts + '</select></div></div></section>'
}

function renderSchoolFields(s, editable) {
  const fieldRow = (label, value) => '<div class="py-2 grid grid-cols-3 gap-3 border-b border-stone-100 last:border-0"><dt class="text-xs uppercase tracking-wider font-medium">' + esc(label) + '</dt><dd class="col-span-2 text-sm">' + (value ? esc(value) : '<span class="text-stone-300">—</span>') + '</dd></div>'
  const pocBlock = (n) => {
    const name = s['poc' + n + '_name'], des = s['poc' + n + '_designation'], em = s['poc' + n + '_email'], num = s['poc' + n + '_number']
    if (!name && !em && !num && !des) return ''
    return '<div class="text-sm mb-3"><div class="font-medium text-stone-800">' + esc(name || '—') + (des ? ' · ' + esc(des) : '') + '</div><div class="text-stone-500 text-xs mt-0.5">' + (esc([em, num].filter(Boolean).join(' · ')) || '—') + '</div></div>'
  }
  const hasPoc = s.poc1_name || s.poc1_email || s.poc1_number || s.poc2_name

function renderFollowUps() {
  const today = todayYMD()
  const groups = { overdue: [], today: [], upcoming: [] }
  for (const f of state.followUps) {
    if (!f.scheduled_for) continue
    if (f.scheduled_for < today) groups.overdue.push(f)
    else if (f.scheduled_for === today) groups.today.push(f)
    else groups.upcoming.push(f)
  }
  const renderGroup = (title, items, dotCls) => items.length === 0 ? '' : '<section class="bg-white border border-stone-200 rounded-lg overflow-hidden"><header class="px-4 py-3 border-b border-stone-200 flex items-center justify-between"><h2 class="text-sm font-semibold text-stone-900">' + title + ' <span class="text-stone-400 font-normal">(' + items.length + ')</span></h2><span class="w-2 h-2 rounded-full ' + dotCls + '"></span></header><ul class="divide-y divide-stone-100">' + items.map(f => renderFollowUpItem(f, today)).join('') + '</ul></section>'
  const empty = state.followUps.length === 0 ? '<div class="bg-white border border-stone-200 rounded-lg px-6 py-12 text-center"><div class="text-3xl mb-2">🎯</div><h2 class="text-base font-semibold text-stone-900">You\'re all caught up</h2><p class="text-sm text-stone-500 mt-1">No pending follow-ups within the next 7 days. Schedule new ones from any school\'s activity log.</p></div>' : ''
  return '<div class="mb-5"><h1 class="text-xl font-semibold tracking-tight text-stone-900">My follow-ups</h1><p class="text-sm text-stone-500 mt-0.5">Open tasks. Each one stays open until you log an actual activity against the school.</p></div><div class="space-y-6 max-w-3xl">' + renderGroup('Overdue', groups.overdue, 'bg-rose-500') + renderGroup('Due today', groups.today, 'bg-amber-500') + renderGroup('Upcoming this week', groups.upcoming, 'bg-stone-300') + empty + '</div>'

function renderFollowUpItem(f, today) {
  const typeStyle = ACTIVITY_TYPE_COLORS[f.activity_type] || ACTIVITY_TYPE_COLORS['Other']

function destroyCharts() {
  for (const k in state.chartInstances) {
    try { state.chartInstances[k].destroy() } catch (e) {}
  }
  state.chartInstances = {}
}

function initDashboardCharts() {
  if (!state.dashboardData) return
  destroyCharts()
  const stages = state.dashboardData.stages || {}
  const stageLabels = STAGES.filter(s => stages[s])
  const stageData = stageLabels.map(s => stages[s])
  const stageColors = stageLabels.map(s => {
    const m = (STAGE_STYLES[s] || '').match(/background:(#[0-9A-Fa-f]+)/)
    return m ? m[1] : '#94A3B8'
  })

  const stagesEl = document.getElementById('chart-stages')
  if (stagesEl) {
    state.chartInstances.stages = new Chart(stagesEl, {
      type: 'bar',
      data: { labels: stageLabels, datasets: [{ data: stageData, backgroundColor: stageColors, borderRadius: 4, borderSkipped: false }] },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1C1917' } },
        scales: {
          x: { beginAtZero: true, grid: { color: '#F5F5F4' }, ticks: { color: '#78716C', font: { size: 11 } } },
          y: { grid: { display: false }, ticks: { color: '#44403C', font: { size: 11 } } }
        }
      }
    })
  }

  // Activity timeline — fill missing days
  const raw = state.dashboardData.daily_activity || []
  const byDay = {}
  raw.forEach(r => { byDay[r.day] = r.n })
  const days = []
  const counts = []
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(); dt.setDate(dt.getDate() - i)
    const ymd = dt.toISOString().slice(0,10)
    days.push(dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }))
    counts.push(byDay[ymd] || 0)
  }
  const actEl = document.getElementById('chart-activity')
  if (actEl) {
    const ctx = actEl.getContext('2d')
    const grad = ctx.createLinearGradient(0, 0, 0, 260)
    grad.addColorStop(0, 'rgba(99, 102, 241, 0.18)')
    grad.addColorStop(1, 'rgba(99, 102, 241, 0)')
    state.chartInstances.activity = new Chart(actEl, {
      type: 'line',
      data: { labels: days, datasets: [{ data: counts, borderColor: '#6366F1', backgroundColor: grad, fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 4, borderWidth: 2 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1C1917' } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#78716C', font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
          y: { beginAtZero: true, grid: { color: '#F5F5F4' }, ticks: { color: '#78716C', font: { size: 11 }, precision: 0 } }
        }
      }
    })
  }
}

let searchDebounce = null
function attachHandlers() {
  const root = document.getElementById('app')

  root.onclick = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    const action = el.dataset.action
    const id = el.dataset.id
    if (action === 'open-school' && e.target.closest('[data-no-row-click], button, input, label, select, a')) return
    if (action === 'login') { e.preventDefault(); login(); return }
    if (action === 'logout') { e.preventDefault(); logout(); return }
    if (action === 'open-school') { window.location.hash = '#/schools/' + encodeURIComponent(id); return }
    if (action === 'clear-filters') { state.filters = { search:'', stage:'', ownerId:'', mineOnly:false }; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'toggle-mine') { state.filters.mineOnly = !state.filters.mineOnly; if (state.filters.mineOnly) state.filters.ownerId = ''; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'page-prev') { state.schoolsPage = Math.max(1, state.schoolsPage - 1); state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'page-next') { state.schoolsPage += 1; state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'take-ownership') { takeOwnership(); return }
    if (action === 'enter-edit-mode') { state.editingSchool = true; render(); return }
    if (action === 'cancel-edit-school') { state.editingSchool = false; render(); return }
    if (action === 'clear-selection') { state.selectedSchoolIds.clear(); render(); return }
    if (action === 'bulk-delete-confirm') { state.bulkPanel = 'delete-confirm'; render(); return }
    if (action === 'cancel-bulk' || action === 'close-modal') { state.bulkPanel = null; render(); return }
    if (action === 'bulk-delete-execute') { bulkDelete(); return }
    if (action === 'start-complete-followup') { state.followUpsCompleting = Number(id); render(); return }
    if (action === 'cancel-complete-followup') { state.followUpsCompleting = null; render(); return }
    if (action === 'set-role') { setUserRole(id, el.dataset.role); return }
    if (action === 'export-csv') { exportSchoolsCsv(); return }
    if (action === 'toggle-audit-log') {
      state.auditLogOpen = !state.auditLogOpen
      if (state.auditLogOpen && state.currentSchool) {
        loadAuditLog(state.currentSchool.school_profile_id).then(render)
      } else {
        render()
      }
      return
    }
  }

  root.onsubmit = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    e.preventDefault()
    const action = el.dataset.action
    if (action === 'submit-activity') return submitActivity(el)
    if (action === 'submit-new-school') return submitNewSchool(el)
    if (action === 'save-school-edits') return saveSchoolEdits(el)
    if (action === 'submit-complete-followup') return completeFollowUp(el.dataset.id, el)
  }

  root.oninput = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    const action = el.dataset.action
    if (action === 'filter-search-input') {
      clearTimeout(searchDebounce)
      searchDebounce = setTimeout(() => {
        state.filters.search = el.value
        state.schoolsPage = 1; state.selectedSchoolIds.clear()
        loadSchools().then(render)
      }, 250)
    }
    if (action === 'bulk-delete-input') {
      const ok = el.value.trim() === 'delete ' + state.selectedSchoolIds.size
      const btn = document.getElementById('bulk-delete-execute')
      if (btn) btn.disabled = !ok
    }
  }

  root.onchange = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    const action = el.dataset.action
    if (action === 'filter-stage-change') { state.filters.stage = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-owner-change') { state.filters.ownerId = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'reassign-owner') { reassignOwner(el.value) }
    if (action === 'toggle-select') { const id = el.dataset.id; if (el.checked) state.selectedSchoolIds.add(id); else state.selectedSchoolIds.delete(id); render() }
    if (action === 'toggle-select-all') { if (el.checked) state.schools.forEach(s => state.selectedSchoolIds.add(s.school_profile_id)); else state.schools.forEach(s => state.selectedSchoolIds.delete(s.school_profile_id)); render() }
    if (action === 'bulk-reassign-change') { const v = el.value; if (v === '') return; if (v === 'UNASSIGN') bulkReassign(null); else bulkReassign(v) }
  }
}

async function handleRoute() {
  if (!state.session) { state.view = 'login'; render(); return }
  destroyCharts()
  const hash = window.location.hash.slice(1) || '/'
  state.editingSchool = false; state.followUpsCompleting = null; state.auditLogOpen = false
  if (hash === '/' || hash === '/schools') {
    state.view = 'schools-list'; render()
    await loadSchools(); render()
  } else if (hash === '/schools/new') {
    state.view = 'school-new'; render()
  } else if (hash.startsWith('/schools/')) {
    const id = decodeURIComponent(hash.split('/')[2])
    state.view = 'school-detail'; state.currentSchool = null; state.activities = []; state.auditLog = []
    render()
    await Promise.all([loadSchool(id), loadActivities(id)])
    render()
  } else if (hash === '/follow-ups') {
    state.view = 'follow-ups'; render()
    await loadFollowUps(); render()
  } else if (hash === '/team') {
    if (!isAdmin()) { window.location.hash = '#/schools'; return }
    state.view = 'team'; render()
    await Promise.all([loadUsers(), loadSchoolCountsByOwner()])
    render()
  } else if (hash === '/dashboard') {
    state.view = 'dashboard'; render()
    await loadDashboard()
    render()
    initDashboardCharts()
  } else {
    window.location.hash = '#/schools'
  }
}

async function init() {
  render()
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    state.session = session
    await Promise.all([loadProfile(), loadUsers(), loadFollowUps()])
  }
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') {
      state.session = session
      await Promise.all([loadProfile(), loadUsers(), loadFollowUps()])
      handleRoute()
    } else if (event === 'SIGNED_OUT') {
      state.session = null; state.profile = null; state.view = 'login'; render()
    }
  })
  window.addEventListener('hashchange', handleRoute)
  handleRoute()
}
init()
</script>
