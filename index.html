const STAGES = ['New Lead','Contacted','Pitched','Agreed','Scheduled','Webinar Done','Closed','Not Interested']

  'Not Interested': 'background:#FEE2E2; color:#991B1B; border-color:#FECACA',
}
const ACTIVITY_TYPE_COLORS = {
  'Call':     { border:'#3B82F6', dot:'bg-blue-500' },
  'Email':    { border:'#6366F1', dot:'bg-indigo-500' },
  'WhatsApp': { border:'#10B981', dot:'bg-emerald-500' },
  'Meeting':  { border:'#A855F7', dot:'bg-purple-500' },

}
const AVATAR_COLORS = ['bg-rose-500','bg-amber-500','bg-emerald-500','bg-cyan-500','bg-indigo-500','bg-fuchsia-500','bg-orange-500','bg-teal-500','bg-violet-500','bg-pink-500','bg-sky-500','bg-lime-600']

const state = {
  session: null, profile: null, view: 'loading',
  schools: [], schoolsTotal: 0, schoolsPage: 1,
  filters: { search:'', stage:'', ownerId:'', mineOnly:false, country:'', state_:'', city:'', createdFrom:'', createdTo:'' },
  filterOptions: { cities: [], states: [], countries: [] },
  reportsData: null,
  reportsFrom: '',
  reportsTo: '',
  selectedSchoolIds: new Set(),
  currentSchool: null, activities: [], editingSchool: false,
  users: [], schoolCountsByOwner: {},
  followUps: [], followUpsCompleting: null,
  followUpsFilter: 'open',           // 'open' | 'overdue' | 'closed'
  followUpsOwnerFilter: 'mine',      // 'mine' | '' (= all team) | user_id

function esc(s) {
  if (s === null || s === undefined) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
function fmtDate(iso) {
  if (!iso) return ''
  const d = new Date(iso); if (isNaN(d)) return ''
  const now = new Date()
  if (d.toDateString() === now.toDateString()) return 'Today ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
  const days = Math.floor((now - d) / 86400000)
  if (days === 1) return 'Yesterday'
  if (days >= 2 && days < 7) return days + ' days ago'
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function fmtDateOnly(iso) {
  if (!iso) return ''
  const d = new Date(iso); if (isNaN(d)) return ''
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function todayYMD() { return new Date().toISOString().slice(0,10) }
function stagePill(stage) {
  const style = STAGE_STYLES[stage] || STAGE_STYLES['New Lead']
  return '<span class="stage-pill" style="' + style + '">' + esc(stage) + '</span>'
}
function userById(id) { return state.users.find(u => u.user_id === id) }
function userName(id) { const u = userById(id); return u ? (u.full_name || u.email) : null }
function userInitials(name) {
  if (!name) return '?'
  const parts = name.split(/\s+/).filter(Boolean)
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase()
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
}
function userColor(id) {
  if (!id) return 'bg-stone-400'
  let h = 0; for (let i = 0; i < id.length; i++) h = (h*31 + id.charCodeAt(i)) >>> 0
  return AVATAR_COLORS[h % AVATAR_COLORS.length]
}
function avatar(id, size = 'sm') {
  const u = userById(id)
  const name = u?.full_name || u?.email || ''
  const sizes = { xs:'w-5 h-5 text-[10px]', sm:'w-6 h-6 text-[11px]', md:'w-8 h-8 text-xs', lg:'w-10 h-10 text-sm' }
  return '<div class="' + sizes[size] + ' ' + userColor(id) + ' rounded-full flex items-center justify-center font-semibold text-white shrink-0" title="' + esc(name) + '">' + esc(userInitials(name)) + '</div>'
}
function avatarWithName(id) {
  const name = userName(id)
  if (!name) return '<span class="text-stone-400 text-xs">Unassigned</span>'
  return '<div class="flex items-center gap-2">' + avatar(id) + '<span class="text-sm text-stone-700 truncate">' + esc(name) + '</span></div>'
}
function isAdmin() { return state.profile?.role === 'admin' }
function canEditSchool(s) { return isAdmin() || (s && s.owner_user_id === state.session?.user?.id) }
function flash(kind, msg) { state.flash = { kind, msg }; render(); setTimeout(() => { state.flash = null; render() }, 3500) }

async function loadProfile() {
  const { data } = await supabase.from('user_profiles').select('user_id,email,full_name,role').eq('user_id', state.session.user.id).single()
  state.profile = data
}
async function loadUsers() {
  const { data } = await supabase.from('user_profiles').select('user_id,email,full_name,role,created_at').order('full_name', { nullsFirst:false })
  state.users = data || []
}
async function loadSchoolCountsByOwner() {
  const { data } = await supabase.from('schools').select('owner_user_id').not('owner_user_id','is',null)
  const counts = {}
  for (const r of data || []) counts[r.owner_user_id] = (counts[r.owner_user_id] || 0) + 1
  state.schoolCountsByOwner = counts
}
async function loadSchools() {
  const offset = (state.schoolsPage - 1) * PAGE_SIZE
  let q = supabase.from('schools')
    .select('school_profile_id,school_name,city,state,current_stage,owner_user_id,last_activity_at', { count:'exact' })
    .order('school_name').range(offset, offset + PAGE_SIZE - 1)
  if (state.filters.search) {
    const s = state.filters.search.replace(/[%_]/g,'')
    q = q.or('school_name.ilike.%' + s + '%,city.ilike.%' + s + '%,state.ilike.%' + s + '%')
  }
  if (state.filters.stage) q = q.eq('current_stage', state.filters.stage)
  if (state.filters.country) q = q.eq('country', state.filters.country)
  if (state.filters.state_) q = q.eq('state', state.filters.state_)
  if (state.filters.city) q = q.eq('city', state.filters.city)
  if (state.filters.createdFrom) q = q.gte('created_at', state.filters.createdFrom)
  if (state.filters.createdTo) q = q.lte('created_at', state.filters.createdTo + 'T23:59:59')
  if (state.filters.mineOnly) q = q.eq('owner_user_id', state.session.user.id)
  else if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
  else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
  const { data, count, error } = await q
  if (error) { flash('err', error.message); return }
  state.schools = data || []
  state.schoolsTotal = count || 0
}
async function loadSchool(id) {
  const { data, error } = await supabase.from('schools').select('*').eq('school_profile_id', id).single()
  if (error) { flash('err', 'Could not load that school'); state.currentSchool = null; return }
  state.currentSchool = data
}
async function loadActivities(id) {
  const { data } = await supabase.from('activities').select('*').eq('school_profile_id', id).order('created_at', { ascending:false }).limit(100)
  state.activities = data || []
}
async function loadFilterOptions() {
  const { data, error } = await supabase.rpc('filter_options')
  if (error) { console.error('loadFilterOptions', error); return }
  state.filterOptions = {
    cities: data?.cities || [],
    states: data?.states || [],
    countries: data?.countries || [],
  }
}

async function loadReports() {
  const today = new Date()
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0,10)
  const todayStr = today.toISOString().slice(0,10)
  if (!state.reportsFrom) state.reportsFrom = monthStart
  if (!state.reportsTo) state.reportsTo = todayStr
  const { data, error } = await supabase.rpc('reports_data', { d_from: state.reportsFrom, d_to: state.reportsTo })
  if (error) { flash('err', error.message); return }
  state.reportsData = data || null
}

async function loadMyOverdueCount() {
  const { count } = await supabase.from('activities')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', state.session.user.id)
    .is('completed_at', null)
    .lt('scheduled_for', todayYMD())
  state.myOverdueCount = count || 0
}

async function loadFollowUpsView() {
  const today = todayYMD()
  const monthStart = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d.toISOString() })()
  const owner = state.followUpsOwnerFilter
  // Default-to-mine for non-admins (safety even though UI enforces it)
  const effectiveOwner = (owner === 'mine' || (!isAdmin() && owner !== state.session.user.id && owner !== ''))
    ? state.session.user.id
    : (owner === '' ? null : owner)
  const applyOwner = (q) => effectiveOwner ? q.eq('user_id', effectiveOwner) : q
  const countQ = () => applyOwner(supabase.from('activities').select('*', { count: 'exact', head: true }))

  const [openRes, overdueRes, closedRes] = await Promise.all([
    countQ().is('completed_at', null).not('scheduled_for', 'is', null),
    countQ().is('completed_at', null).lt('scheduled_for', today),
    countQ().gte('completed_at', monthStart).not('scheduled_for', 'is', null),
  ])
  state.followUpsCounts = {
    open: openRes.count || 0,
    overdue: overdueRes.count || 0,
    closed_7d: closedRes.count || 0,
  }

  let q = applyOwner(supabase.from('activities').select('*, school:schools(school_profile_id,school_name,city,state,current_stage)'))
  if (state.followUpsFilter === 'open') {
    q = q.is('completed_at', null).not('scheduled_for', 'is', null).order('scheduled_for', { ascending: true })
  } else if (state.followUpsFilter === 'overdue') {
    q = q.is('completed_at', null).lt('scheduled_for', today).order('scheduled_for', { ascending: true })
  } else {
    q = q.gte('completed_at', monthStart).not('scheduled_for', 'is', null).order('completed_at', { ascending: false })
  }
  const { data, error } = await q.limit(200)
  if (error) { flash('err', error.message); return }
  state.followUps = data || []
}

async function loadDashboard() {
  const { data, error } = await supabase.rpc('dashboard_data')
  if (error) { flash('err', error.message); return }
  state.dashboardData = data || null
}

async function exportSchoolsCsv() {
  if (state.exporting) return
  state.exporting = true; render()
  // Paginate through filtered schools (Supabase max ~1000 per request)
  const all = []
  const pageSize = 1000
  let from = 0
  while (true) {
    let q = supabase.from('schools')
      .select('school_profile_id,school_name,school_type,address,pin_code,city,state,country,email,phone_no,curriculum_followed,school_fees,school_fees_range,poc1_designation,poc1_email,poc1_name,poc1_number,poc2_designation,poc2_email,poc2_name,poc2_number,owner_user_id,current_stage,last_activity_at')
      .order('school_name').range(from, from + pageSize - 1)
    if (state.filters.search) {
      const s = state.filters.search.replace(/[%_]/g,'')
      q = q.or('school_name.ilike.%' + s + '%,city.ilike.%' + s + '%,state.ilike.%' + s + '%')
    }
    if (state.filters.stage) q = q.eq('current_stage', state.filters.stage)
    if (state.filters.mineOnly) q = q.eq('owner_user_id', state.session.user.id)
    else if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
    else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
    const { data, error } = await q
    if (error) { state.exporting = false; flash('err', error.message); render(); return }
    all.push(...(data || []))
    if (!data || data.length < pageSize) break
    from += pageSize
  }
  // Build CSV
  const headers = ['ID','School name','Type','Address','Pin code','City','State','Country','Email','Phone','Curriculum','Fees','Fees range','POC1 designation','POC1 email','POC1 name','POC1 phone','POC2 designation','POC2 email','POC2 name','POC2 phone','Owner','Stage','Last activity']
  const csvEsc = (v) => {
    if (v === null || v === undefined) return ''
    const s = String(v)
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s
  }
  const lines = [headers.map(csvEsc).join(',')]
  for (const r of all) {
    lines.push([
      r.school_profile_id, r.school_name, r.school_type, r.address, r.pin_code, r.city, r.state, r.country,
      r.email, r.phone_no, r.curriculum_followed, r.school_fees, r.school_fees_range,
      r.poc1_designation, r.poc1_email, r.poc1_name, r.poc1_number,
      r.poc2_designation, r.poc2_email, r.poc2_name, r.poc2_number,
      userName(r.owner_user_id) || '', r.current_stage, r.last_activity_at || ''
    ].map(csvEsc).join(','))
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = 'schools-' + new Date().toISOString().slice(0,10) + '.csv'
  a.click()
  URL.revokeObjectURL(url)
  state.exporting = false; flash('ok', 'Exported ' + all.length + ' rows'); render()
}

  const { error } = await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin + window.location.pathname } })
  if (error) flash('err', error.message)
}
async function logout() { await supabase.auth.signOut(); window.location.hash = '' }

async function submitActivity(form) {
  if (state.saving) return
  const newStage = form.new_stage.value || null
  const scheduledFor = form.scheduled_for.value || null
  const activityType = form.activity_type.value
  const stageNow = newStage || state.currentSchool.current_stage
  const stageIsTerminal = TERMINAL_STAGES.includes(stageNow)

  // ENFORCE: every logged activity is a completed activity. The school must either
  // (a) have a next follow-up scheduled, or (b) be moved to a terminal stage.
  if (!stageIsTerminal && !scheduledFor) {
    flash('err', 'Set the next follow-up date, or move stage to Closed / Webinar Done / Not Interested.')
    return
  }

  state.saving = true; render()
  const nowIso = new Date().toISOString()

  // 1. Insert the completed activity
  const primary = {
    school_profile_id: state.currentSchool.school_profile_id,
    user_id: state.session.user.id,
    activity_type: activityType,
    outcome: form.outcome.value.trim() || null,
    notes: form.notes.value.trim() || null,
    scheduled_for: scheduledFor,
    completed_at: nowIso,
    stage_at_time: stageNow,
  }
  const { error: insErr } = await supabase.from('activities').insert(primary)
  if (insErr) { state.saving = false; flash('err', insErr.message); render(); return }

  // 2. Auto-close any open follow-up tasks for this school by this user.
  await supabase.from('activities')
    .update({ completed_at: nowIso, outcome: 'Closed by ' + activityType + ' activity' })
    .eq('school_profile_id', state.currentSchool.school_profile_id)
    .eq('user_id', state.session.user.id)
    .is('completed_at', null)
    .not('scheduled_for', 'is', null)

  // 3. If a next follow-up date is set and stage isn't terminal, create the next task.
  if (scheduledFor && !stageIsTerminal) {
    const followUp = {
      school_profile_id: state.currentSchool.school_profile_id,
      user_id: state.session.user.id,
      activity_type: activityType,
      outcome: null,
      notes: 'Follow-up scheduled from ' + fmtDateOnly(nowIso),
      scheduled_for: scheduledFor,
      completed_at: null,
      stage_at_time: stageNow,
    }
    await supabase.from('activities').insert(followUp)
  }

  // 4. Stage change on the school, if any
  if (newStage && newStage !== state.currentSchool.current_stage) {
    await supabase.from('schools').update({ current_stage: newStage }).eq('school_profile_id', state.currentSchool.school_profile_id)
  }

  await Promise.all([
    loadSchool(state.currentSchool.school_profile_id),
    loadActivities(state.currentSchool.school_profile_id),
    loadMyOverdueCount(),
  ])
  state.saving = false
  flash('ok', stageIsTerminal ? 'Activity logged · school marked ' + stageNow : 'Activity logged · next follow-up scheduled')
  render()
}

async function saveSchoolEdits(form) {
  if (state.saving) return
  state.saving = true; render()
  const fields = ['school_name','school_type','address','pin_code','city','state','country','email','phone_no','curriculum_followed','school_fees','school_fees_range','poc1_designation','poc1_email','poc1_name','poc1_number','poc2_designation','poc2_email','poc2_name','poc2_number']
  const patch = {}
  fields.forEach(f => { const v = form[f]?.value?.trim(); patch[f] = v === '' ? null : v })
  const { error } = await supabase.from('schools').update(patch).eq('school_profile_id', state.currentSchool.school_profile_id)
  state.saving = false
  if (error) { flash('err', error.message); render(); return }
  state.editingSchool = false
  await loadSchool(state.currentSchool.school_profile_id)
  flash('ok', 'School updated'); render()
}

async fun
