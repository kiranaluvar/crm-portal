function esc(s) {
  if (s === null || s === undefined) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
function fmtDate(iso) {
  if (!iso) return ''
  const d = new Date(iso); if (isNaN(d)) return ''
  const now = new Date()
  if (d.toDateString() === now.toDateString()) return 'Today ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
  const days = Math.floor((now - d) / 86400000)
  if (days === 1) return 'Yesterday'
  if (days >= 2 && days < 7) return days + ' days ago'
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function fmtDateOnly(iso) {
  if (!iso) return ''
  const d = new Date(iso); if (isNaN(d)) return ''
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function todayYMD() { return new Date().toISOString().slice(0,10) }
function stagePill(group, sub) {
  const s = STAGE_GROUP_STYLES[group] || { bg:'#F5F5F4', color:'#44403C', border:'#E7E5E4' }
  const style = 'background:' + s.bg + ';color:' + s.color + ';border-color:' + s.border
  return '<span class="stage-pill" style="' + style + '"><span style="opacity:0.6;margin-right:3px">' + esc(group||'') + '</span><span style="opacity:0.4;margin-right:3px">›</span>' + esc(sub||'') + '</span>'
}
function userById(id) { return state.users.find(u => u.user_id === id) }
function userName(id) { const u = userById(id); return u ? (u.full_name || u.email) : null }
function userInitials(name) {
  if (!name) return '?'
  const parts = name.split(/\s+/).filter(Boolean)
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase()
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
}
function userColor(id) {
  if (!id) return 'bg-stone-400'
  let h = 0; for (let i = 0; i < id.length; i++) h = (h*31 + id.charCodeAt(i)) >>> 0
  return AVATAR_COLORS[h % AVATAR_COLORS.length]
}
function avatar(id, size = 'sm') {
  const u = userById(id)
  const name = u?.full_name || u?.email || ''
  const sizes = { xs:'w-5 h-5 text-[10px]', sm:'w-6 h-6 text-[11px]', md:'w-8 h-8 text-xs', lg:'w-10 h-10 text-sm' }
  return '<div class="' + sizes[size] + ' ' + userColor(id) + ' rounded-full flex items-center justify-center font-semibold text-white shrink-0" title="' + esc(name) + '">' + esc(userInitials(name)) + '</div>'
}
function avatarWithName(id) {
  const name = userName(id)
  if (!name) return '<span class="text-stone-400 text-xs">Unassigned</span>'
  return '<div class="flex items-center gap-2">' + avatar(id) + '<span class="text-sm text-stone-700 truncate">' + esc(name) + '</span></div>'
}
function isAdmin() { return state.profile?.role === 'admin' }
function canEditSchool(s) { return isAdmin() || (s && s.owner_user_id === state.session?.user?.id) }
function flash(kind, msg) { state.flash = { kind, msg }; render(); setTimeout(() => { state.flash = null; render() }, 3500) }

async function loadSchools() {
  const offset = (state.schoolsPage - 1) * PAGE_SIZE
  let q = supabase.from('schools')
    .select('school_profile_id,school_name,city,state,stage_group,stage_sub,not_eligible,owner_user_id,last_activity_at', { count:'exact' })
    .order('school_name').range(offset, offset + PAGE_SIZE - 1)
  if (state.filters.search) {
    const s = state.filters.search.replace(/[%_]/g,'')
    q = q.or('school_name.ilike.%' + s + '%,city.ilike.%' + s + '%,state.ilike.%' + s + '%')
  }
  if (state.filters.stageGroup) q = q.eq('stage_group', state.filters.stageGroup)
  if (state.filters.stageSub)   q = q.eq('stage_sub',   state.filters.stageSub)
  if (state.filters.country) q = q.eq('country', state.filters.country)
  if (state.filters.state_) q = q.eq('state', state.filters.state_)
  if (state.filters.city) q = q.eq('city', state.filters.city)
  if (state.filters.createdFrom) q = q.gte('created_at', state.filters.createdFrom)
  if (state.filters.createdTo) q = q.lte('created_at', state.filters.createdTo + 'T23:59:59')
  if (state.filters.mineOnly) q = q.eq('owner_user_id', state.session.user.id)
  else if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
  else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
  const { data, count, error } = await q
  if (error) { flash('err', error.message); return }
  state.schools = data || []
  state.schoolsTotal = count || 0
}

async function loadFollowUpsView() {
  const today = todayYMD()
  const monthStart = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d.toISOString() })()
  const owner = state.followUpsOwnerFilter
  const effectiveOwner = (owner === 'mine' || (!isAdmin() && owner !== state.session.user.id && owner !== ''))
    ? state.session.user.id
    : (owner === '' ? null : owner)

  const baseQInner = (effectiveOwner)
    ? () => supabase.from('activities')
        .select('*, school:schools!inner(school_profile_id,school_name,city,state,stage_group,stage_sub,owner_user_id)', { count: 'exact', head: true })
        .eq('user_id', effectiveOwner)
        .eq('school.owner_user_id', effectiveOwner)
    : () => supabase.from('activities')
        .select('*, school:schools!inner(school_profile_id,school_name,city,state,stage_group,stage_sub,owner_user_id)', { count: 'exact', head: true })

  const [openRes, todayRes, overdueRes, closedRes] = await Promise.all([
    baseQInner().is('completed_at', null).not('scheduled_for', 'is', null),
    baseQInner().is('completed_at', null).eq('scheduled_for', today),
    baseQInner().is('completed_at', null).lt('scheduled_for', today),
    baseQInner().gte('completed_at', monthStart).not('scheduled_for', 'is', null),
  ])
  state.followUpsCounts = {
    open:      openRes.count    || 0,
    today:     todayRes.count   || 0,
    overdue:   overdueRes.count || 0,
    closed_7d: closedRes.count  || 0,
  }

  // Build list query — always restrict to owned schools
  let q = (effectiveOwner
    ? supabase.from('activities')
        .select('*, school:schools!inner(school_profile_id,school_name,city,state,stage_group,stage_sub,owner_user_id)')
        .eq('user_id', effectiveOwner)
        .eq('school.owner_user_id', effectiveOwner)
    : supabase.from('activities')
        .select('*, school:schools!inner(school_profile_id,school_name,city,state,stage_group,stage_sub,owner_user_id)')
  )

  if (state.followUpsFilter === 'open') {
    q = q.is('completed_at', null).not('scheduled_for', 'is', null).order('scheduled_for', { ascending: true })
  } else if (state.followUpsFilter === 'today') {
    q = q.is('completed_at', null).eq('scheduled_for', today).order('scheduled_for', { ascending: true })
  } else if (state.followUpsFilter === 'overdue') {
    q = q.is('completed_at', null).lt('scheduled_for', today).order('scheduled_for', { ascending: true })
  } else {
    q = q.gte('completed_at', monthStart).not('scheduled_for', 'is', null).order('completed_at', { ascending: false })
  }
  const { data, error } = await q.limit(200)
  if (error) { flash('err', error.message); return }
  state.followUps = data || []
}

async function exportSchoolsCsv() {
  if (state.exporting) return
  state.exporting = true; render()
  // Paginate through filtered schools (Supabase max ~1000 per request)
  const all = []
  const pageSize = 1000
  let from = 0
  while (true) {
    let q = supabase.from('schools')
      .select('school_profile_id,school_name,school_type,address,pin_code,city,state,country,email,phone_no,curriculum_followed,school_fees,school_fees_range,poc1_designation,poc1_email,poc1_name,poc1_number,poc2_designation,poc2_email,poc2_name,poc2_number,owner_user_id,stage_group,stage_sub,not_eligible,last_activity_at')
      .order('school_name').range(from, from + pageSize - 1)
    if (state.filters.search) {
      const s = state.filters.search.replace(/[%_]/g,'')
      q = q.or('school_name.ilike.%' + s + '%,city.ilike.%' + s + '%,state.ilike.%' + s + '%')
    }
    if (state.filters.stageGroup) q = q.eq('stage_group', state.filters.stageGroup)
    if (state.filters.mineOnly) q = q.eq('owner_user_id', state.session.user.id)
    else if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
    else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
    const { data, error } = await q
    if (error) { state.exporting = false; flash('err', error.message); render(); return }
    all.push(...(data || []))
    if (!data || data.length < pageSize) break
    from += pageSize
  }
  // Build CSV
  const headers = ['ID','School name','Type','Address','Pin code','City','State','Country','Email','Phone','Curriculum','Fees','Fees range','POC1 designation','POC1 email','POC1 name','POC1 phone','POC2 designation','POC2 email','POC2 name','POC2 phone','Owner','Stage group','Stage','Not eligible','Last activity']
  const csvEsc = (v) => {
    if (v === null || v === undefined) return ''
    const s = String(v)
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s
  }
  const lines = [headers.map(csvEsc).join(',')]
  for (const r of all) {
    lines.push([
      r.school_profile_id, r.school_name, r.school_type, r.address, r.pin_code, r.city, r.state, r.country,
      r.email, r.phone_no, r.curriculum_followed, r.school_fees, r.school_fees_range,
      r.poc1_designation, r.poc1_email, r.poc1_name, r.poc1_number,
      r.poc2_designation, r.poc2_email, r.poc2_name, r.poc2_number,
      userName(r.owner_user_id) || '', r.stage_group, r.stage_sub, r.not_eligible ? 'Yes' : 'No', r.last_activity_at || ''
    ].map(csvEsc).join(','))
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = 'schools-' + new Date().toISOString().slice(0,10) + '.csv'
  a.click()
  URL.revokeObjectURL(url)
  state.exporting = false; flash('ok', 'Exported ' + all.length + ' rows'); render()
}

async function submitActivity(form) {
  if (state.saving) return
  const activityType = form.activity_type.value
  const newGroup = form.new_stage_group?.value || ''
  const newSub   = form.new_stage_sub?.value   || ''
  const scheduledFor = form.scheduled_for?.value || null
  const s = state.currentSchool

  const effectiveGroup = newGroup || s.stage_group
  const effectiveSub   = newSub   || s.stage_sub

  // Webinar date required when moving to Confirm
  const webinarDate = form.webinar_date?.value || null
  const webinarTime = form.webinar_time?.value || null
  if (newSub === 'Confirm' && !webinarDate) {
    flash('err', 'Add the webinar date before confirming.'); return
  }

  // Not Interested reason required
  const niReason = form.ni_reason?.value || null
  const niReasonOther = form.ni_reason_other?.value?.trim() || null
  if (newSub === 'Not Interested' && !niReason) {
    flash('err', 'Select a reason for Not Interested.'); return
  }

  // Exam schedule fields
  const examType  = form.exam_type?.value  || null
  const examStart = form.exam_start?.value || null
  const examEnd   = form.exam_end?.value   || null

  // Vacation schedule fields
  const vacType  = form.vac_type?.value  || null
  const vacStart = form.vac_start?.value || null
  const vacEnd   = form.vac_end?.value   || null

  // Follow-up date rule: required unless terminal sub, not-eligible, or webinar passed
  const noFollowupSub = NO_FOLLOWUP_SUBS.includes(effectiveSub)
  const webinarPassed = s.stage_sub === 'Confirm' && (() => {
    // find latest webinar date for this school from state
    const dates = state.webinarDates || []
    if (!dates.length) return false
    const latest = dates.reduce((a, b) => a.webinar_date > b.webinar_date ? a : b)
    return latest.webinar_date < todayYMD()
  })()
  const needFollowup = !noFollowupSub && !s.not_eligible && !webinarPassed
  if (needFollowup && !scheduledFor) {
    flash('err', 'Set the next follow-up date, or move to a terminal stage (Not Interested, Backed Out, Attempt Exhausted).'); return
  }

  state.saving = true; render()
  const nowIso = new Date().toISOString()

  // 1. Insert completed activity
  const primary = {
    school_profile_id: s.school_profile_id,
    user_id: state.session.user.id,
    activity_type: activityType,
    outcome: form.outcome?.value?.trim() || null,
    notes: form.notes?.value?.trim() || null,
    scheduled_for: scheduledFor,
    completed_at: nowIso,
    stage_group_at_time: effectiveGroup,
    stage_sub_at_time: effectiveSub,
    not_interested_reason: niReason,
    not_interested_reason_other: niReason === 'Others' ? niReasonOther : null,
    exam_type: examType, exam_start: examStart, exam_end: examEnd,
    vacation_type: vacType, vacation_start: vacStart, vacation_end: vacEnd,
  }
  const { error: insErr } = await supabase.from('activities').insert(primary)
  if (insErr) { state.saving = false; flash('err', insErr.message); render(); return }

  // 2. Auto-close open follow-up tasks for this school+user
  await supabase.from('activities')
    .update({ completed_at: nowIso, outcome: 'Closed by ' + activityType + ' activity' })
    .eq('school_profile_id', s.school_profile_id)
    .eq('user_id', state.session.user.id)
    .is('completed_at', null)
    .not('scheduled_for', 'is', null)

  // 3. Create next follow-up task if needed
  if (scheduledFor && needFollowup) {
    await supabase.from('activities').insert({
      school_profile_id: s.school_profile_id,
      user_id: state.session.user.id,
      activity_type: activityType,
      notes: 'Follow-up scheduled from ' + fmtDateOnly(nowIso),
      scheduled_for: scheduledFor,
      completed_at: null,
      stage_group_at_time: effectiveGroup,
      stage_sub_at_time: effectiveSub,
    })
  }

  // 4. Stage change on school
  if (newGroup || newSub) {
    const stageUpdate = {}
    if (newGroup) stageUpdate.stage_group = newGroup
    if (newSub)   stageUpdate.stage_sub   = newSub
    await supabase.from('schools').update(stageUpdate).eq('school_profile_id', s.school_profile_id)
  }

  // 5. Webinar date insert
  if (newSub === 'Confirm' && webinarDate) {
    await supabase.from('webinar_dates').insert({
      school_profile_id: s.school_profile_id,
      webinar_date: webinarDate,
      webinar_time: webinarTime || null,
      created_by: state.session.user.id,
    })
  }

  await Promise.all([
    loadSchool(s.school_profile_id),
    loadActivities(s.school_profile_id),
    loadWebinarDates(s.school_profile_id),
    loadMyOverdueCount(),
  ])
  state.saving = false
  flash('ok', noFollowupSub ? 'Activity logged' : 'Activity logged · next follow-up scheduled')
  render()
}

async function saveSchoolEdits(form) {
  if (state.saving) return
  state.saving = true; render()
  const fields = ['school_name','school_type','address','pin_code','city','state','country','email','phone_no','curriculum_followed','school_fees','school_fees_range','poc1_designation','poc1_email','poc1_name','poc1_number','poc2_designation','poc2_email','poc2_name','poc2_number']
  const patch = {}
  fields.forEach(f => { const v = form[f]?.value?.trim(); patch[f] = v === '' ? null : v })
  const { error } = await supabase.from('schools').update(patch).eq('school_profile_id', state.currentSchool.school_profile_id)
  state.saving = false
  if (error) { flash('err', error.message); render(); return }
  state.editingSchool = false
  await loadSchool(state.currentSchool.school_profile_id)
  flash('ok', 'School updated'); render()
}

async function takeOwnership() {

  if (error) { flash('err', error.message); return }

async function submitNewSchool(form) {
  if (state.saving) return
  state.saving = true; render()
  // Auto-generate next school_profile_id: find max numeric existing ID, add 1
  const { data: maxRows, error: maxErr } = await supabase.from('schools')
    .select('school_profile_id').order('school_profile_id', { ascending: false }).limit(50)
  if (maxErr) { state.saving = false; flash('err', maxErr.message); render(); return }
  let maxNum = 0
  for (const r of maxRows || []) {
    const n = parseInt(String(r.school_profile_id).replace(/\D/g, ''), 10)
    if (!isNaN(n) && n > maxNum) maxNum = n
  }
  const newId = String(maxNum + 1)
  const row = { school_profile_id: newId }
  const fields = ['school_name','school_type','address','pin_code','city','state','country','email','phone_no','curriculum_followed','school_fees','school_fees_range','poc1_designation','poc1_email','poc1_name','poc1_number','poc2_designation','poc2_email','poc2_name','poc2_number']
  fields.forEach(f => { const v = form[f]?.value?.trim(); if (v) row[f] = v })
  row.created_by = state.session.user.id
  row.owner_user_id = state.session.user.id
  const { error } = await supabase.from('schools').insert(row)
  state.saving = false
  if (error) { flash('err', error.message); render(); return }
  // Refresh filter options in case a new country/state/city was added
  loadFilterOptions()
  flash('ok','School added (ID ' + newId + ')')
  window.location.hash = '#/schools/' + encodeURIComponent(newId)
}

async function completeFollowUp(activityId, form) {
  const outcome = form.outcome.value.trim() || null
  const additional = form.notes.value.trim()
  const fu = state.followUps.find(f => f.id === Number(activityId))
  const mergedNotes = additional ? (fu?.notes ? fu.notes + '\n\n— ' + additional : additional) : fu?.notes || null
  const { error } = await supabase.from('activities').update({ completed_at: new Date().toISOString(), outcome, notes: mergedNotes }).eq('id', Number(activityId))
  if (error) { flash('err', error.message); return }
  flash('ok', 'Marked complete'); state.followUpsCompleting = null
  await loadMyOverdueCount(); render()
}

  const editable = canEditSchool(s)
  const ownerName = userName(s.owner_user_id)

  const activityItems = state.activities.length === 0
    ? '<div class="text-sm text-stone-400 py-8 text-center">No activities logged yet. Use the form on the left to log the first one.</div>'
    : state.activities.map(a => {
      const who = userName(a.user_id) || 'Unknown'
      const typeStyle = ACTIVITY_TYPE_COLORS[a.activity_type] || ACTIVITY_TYPE_COLORS['Other']
      const isPending = !a.completed_at
      const when = a.completed_at ? fmtDate(a.completed_at) : (a.scheduled_for ? 'Scheduled for ' + fmtDateOnly(a.scheduled_for) : fmtDate(a.created_at))
      const stageChanged = (a.stage_group_at_time && a.stage_sub_at_time) && (a.stage_group_at_time !== s.stage_group || a.stage_sub_at_time !== s.stage_sub)
      const niInfo = a.not_interested_reason ? '<div class="text-xs text-rose-600 mt-1">Reason: ' + esc(a.not_interested_reason) + (a.not_interested_reason_other ? ' — ' + esc(a.not_interested_reason_other) : '') + '</div>' : ''
      const examInfo = a.exam_type ? '<div class="text-xs text-amber-700 mt-1">Exam: ' + esc(a.exam_type) + (a.exam_start ? ' (' + esc(fmtDateOnly(a.exam_start)) + (a.exam_end ? ' → ' + esc(fmtDateOnly(a.exam_end)) : '') + ')' : '') + '</div>' : ''
      const vacInfo  = a.vacation_type ? '<div class="text-xs text-amber-700 mt-1">Vacation: ' + esc(a.vacation_type) + (a.vacation_start ? ' (' + esc(fmtDateOnly(a.vacation_start)) + (a.vacation_end ? ' → ' + esc(fmtDateOnly(a.vacation_end)) : '') + ')' : '') + '</div>' : ''
      return '<div class="py-3 pl-4 mb-2 border-l-2' + (isPending ? ' bg-amber-50/30' : '') + '" style="border-left-color: ' + (isPending ? '#FBBF24' : typeStyle.border) + '"><div class="flex items-center justify-between flex-wrap gap-2"><div class="flex items-center gap-2"><span class="inline-flex items-center gap-1.5 text-xs font-semibold text-stone-800"><span class="w-1.5 h-1.5 rounded-full ' + typeStyle.dot + '"></span>' + esc(a.activity_type) + '</span>' + (isPending ? '<span class="text-[10px] font-semibold uppercase tracking-wider text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded">Pending</span>' : '') + (stageChanged ? '<span class="text-xs text-stone-400">→ ' + esc(a.stage_sub_at_time) + '</span>' : '') + '</div><div class="text-xs text-stone-400 flex items-center gap-2">' + avatar(a.user_id, 'xs') + '<span>' + esc(when) + '</span></div></div>' + (a.outcome ? '<div class="text-sm text-stone-800 mt-1.5">' + esc(a.outcome) + '</div>' : '') + (a.notes ? '<div class="text-sm text-stone-600 mt-1 whitespace-pre-wrap">' + esc(a.notes) + '</div>' : '') + niInfo + examInfo + vacInfo + (a.scheduled_for && a.completed_at ? '<div class="text-xs text-stone-400 mt-1">Follow-up planned: ' + esc(fmtDateOnly(a.scheduled_for)) + '</div>' : '') + '</div>'
    }).join('')

  const userOpts = state.users.map(u => '<option value="' + esc(u.user_id) + '"' + (s.owner_user_id === u.user_id ? ' selected' : '') + '>' + esc(u.full_name || u.email) + '</option>').join('')

  const ownerSlot = s.owner_user_id
    ? '<div class="flex items-center gap-2">' + avatar(s.owner_user_id) + '<span class="text-xs text-stone-600">' + esc(ownerName) + '</span></div>'
    : '<button data-action="take-ownership" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium border border-indigo-200 hover:border-indigo-400 px-2.5 py-1 rounded-md">Take ownership</button>'

  // Find any pending follow-up for current user on this school
  const myPending = state.activities.find(a => !a.completed_at && a.scheduled_for && a.user_id === state.session.user.id)
  let banner = ''
  if (myPending) {
    const today = todayYMD()
    const isOverdue = myPending.scheduled_for < today
    const isTodaysTask = myPending.scheduled_for === today
    const tone = isOverdue ? { bg: 'bg-rose-50', bd: 'border-rose-200', tx: 'text-rose-700', icon: '⚠' }
                : isTodaysTask ? { bg: 'bg-amber-50', bd: 'border-amber-200', tx: 'text-amber-800', icon: '⏰' }
                : { bg: 'bg-indigo-50', bd: 'border-indigo-200', tx: 'text-indigo-700', icon: '📌' }
    const label = isOverdue ? 'Overdue follow-up' : (isTodaysTask ? 'Follow-up due today' : 'Follow-up scheduled')
    banner = '<div class="mb-4 ' + tone.bg + ' border ' + tone.bd + ' rounded-lg px-4 py-3 flex items-center gap-3"><span class="text-base">' + tone.icon + '</span><div class="text-sm flex-1"><span class="' + tone.tx + ' font-semibold">' + label + ':</span> <span class="text-stone-700">' + esc(myPending.activity_type) + ' on ' + esc(fmtDateOnly(myPending.scheduled_for)) + '</span></div><div class="text-xs text-stone-500">Log the activity to close this task →</div></div>'
  }

  return banner + '<div class="mb-5 flex items-start justify-between gap-4 flex-wrap"><div><div class="text-xs text-stone-400 font-mono mb-1">ID ' + esc(s.school_profile_id) + '</div><h1 class="text-2xl font-semibold tracking-tight text-stone-900">' + esc(s.school_name) + (s.not_eligible ? ' <span class="text-sm font-medium text-rose-600 bg-rose-50 border border-rose-200 px-2 py-0.5 rounded-md ml-2">Not Eligible</span>' : '') + '</h1><div class="text-sm text-stone-500 mt-1">' + esc([s.city, s.state, s.country].filter(Boolean).join(', ')) + '</div></div><div class="flex items-center gap-3 flex-wrap justify-end">' + stagePill(s.stage_group, s.stage_sub) + ownerSlot + '</div></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-1 space-y-6">' + renderActivityForm(s) + renderNotEligiblePanel(s) + (isAdmin() ? renderAdminPanel(userOpts) : '') + '</div><div class="lg:col-span-2 space-y-6">' + (state.editingSchool ? renderSchoolEditForm(s) : renderSchoolFields(s, editable)) + renderWebinarDatesSection() + '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Activity timeline <span class="text-stone-400 font-normal">(' + state.activities.length + ')</span></h2></header><div class="p-4">' + activityItems + '</div></section>' + renderAuditLogSection(s) + '</div></div>'
}

function renderActivityForm(s) {
  // Only owner or admin can log activities
  const canLog = isAdmin() || s.owner_user_id === state.session?.user?.id
  if (!canLog) {
    return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Log activity</h2></header><div class="p-4 text-sm text-stone-400 italic">Only the school owner or an admin can log activities.</div></section>'
  }
  const isTerminalSub = NO_FOLLOWUP_SUBS.includes(s.stage_sub)
  const isNotEligible = s.not_eligible
  // Check if webinar date has passed (Confirm stage)
  const webinarPassed = s.stage_sub === 'Confirm' && (() => {
    const dates = state.webinarDates || []
    if (!dates.length) return false
    const latest = dates.reduce((a, b) => a.webinar_date > b.webinar_date ? a : b)
    return latest.webinar_date < todayYMD()
  })()
  const needFollowup = !isTerminalSub && !isNotEligible && !webinarPassed

  const groupOpts = STAGE_GROUPS.map(g => '<option value="' + esc(g) + '"' + (g === s.stage_group ? ' selected' : '') + '>' + esc(g) + '</option>').join('')
  const subOpts = (STAGE_SUBS[s.stage_group] || []).map(st => '<option value="' + esc(st) + '"' + (st === s.stage_sub ? ' selected' : '') + '>' + esc(st) + '</option>').join('')

  const hint = !needFollowup
    ? '<div class="text-xs text-stone-500 italic">No follow-up task required for this stage.</div>'
    : '<div class="text-xs text-stone-500 italic">Follow-up date required — or move to a terminal sub-stage.</div>'

  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Log activity</h2></header><form data-action="submit-activity" class="p-4 space-y-3">' +
    '<div><label class="block text-xs font-medium text-stone-600 mb-1">Type</label><select name="activity_type" required class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring">' + ACTIVITY_TYPES.map(t => '<option>' + esc(t) + '</option>').join('') + '</select></div>' +
    '<div><label class="block text-xs font-medium text-stone-600 mb-1">Outcome <span class="text-stone-400 font-normal">(short)</span></label><input type="text" name="outcome" placeholder="e.g., Spoke to principal" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"></div>' +
    '<div><label class="block text-xs font-medium text-stone-600 mb-1">Notes</label><textarea name="notes" rows="2" placeholder="Details, next steps…" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring resize-none"></textarea></div>' +
    '<div class="grid grid-cols-2 gap-3">' +
      '<div><label class="block text-xs font-medium text-stone-600 mb-1">Move group to</label>' +
        '<select name="new_stage_group" id="act-stage-group" onchange="updateSubStageOptions(this.value)" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">Keep current</option>' + groupOpts + '</select></div>' +
      '<div><label class="block text-xs font-medium text-stone-600 mb-1">Move sub-stage to</label>' +
        '<select name="new_stage_sub" id="act-stage-sub" onchange="toggleActivityFormFields()" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">Keep current</option>' + subOpts + '</select></div>' +
    '</div>' +
    // Not Interested reason (shown when sub = Not Interested)
    '<div id="ni-reason-row" style="display:none"><label class="block text-xs font-medium text-stone-600 mb-1">Reason <span class="text-rose-500">*</span></label>' +
      '<select name="ni_reason" id="ni-reason-sel" onchange="toggleNiOther()" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">— Select reason —</option>' + NOT_INTERESTED_REASONS.map(r => '<option>' + esc(r) + '</option>').join('') + '</select>' +
      '<input type="text" name="ni_reason_other" id="ni-reason-other" placeholder="Specify reason…" style="display:none" class="w-full mt-2 text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"></div>' +
    // Exam schedule fields
    '<div id="exam-row" style="display:none" class="space-y-2"><label class="block text-xs font-medium text-stone-600">Exam schedule</label>' +
      '<select name="exam_type" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">— Exam type —</option>' + EXAM_TYPES.map(t => '<option>' + esc(t) + '</option>').join('') + '</select>' +
      '<div class="grid grid-cols-2 gap-2"><input type="date" name="exam_start" class="text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring" placeholder="Start"><input type="date" name="exam_end" class="text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring" placeholder="End"></div></div>' +
    // Vacation schedule fields
    '<div id="vacation-row" style="display:none" class="space-y-2"><label class="block text-xs font-medium text-stone-600">Vacation schedule</label>' +
      '<select name="vac_type" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">— Vacation type —</option>' + VACATION_TYPES.map(t => '<option>' + esc(t) + '</option>').join('') + '</select>' +
      '<div class="grid grid-cols-2 gap-2"><input type="date" name="vac_start" class="text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring" placeholder="Start"><input type="date" name="vac_end" class="text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring" placeholder="End"></div></div>' +
    // Webinar date/time fields (shown when sub = Confirm)
    '<div id="webinar-date-row" style="display:none"><label class="block text-xs font-medium text-stone-600 mb-1">Webinar date <span class="text-rose-500">*</span></label>' +
      '<div class="grid grid-cols-2 gap-2"><input type="date" name="webinar_date" class="text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"><input type="time" name="webinar_time" class="text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"></div></div>' +
    '<div id="followup-date-row"' + (needFollowup ? '' : ' style="display:none"') + '><label class="block text-xs font-medium text-stone-600 mb-1">Next follow-up date' + (needFollowup ? ' <span class="text-rose-500">*</span>' : '') + '</label><input type="date" name="scheduled_for" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring" min="' + todayYMD() + '"></div>' +
    hint +
    '<button type="submit"' + (state.saving ? ' disabled' : '') + ' class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white text-sm font-medium py-2 rounded-md transition">' + (state.saving ? 'Saving…' : 'Log activity') + '</button>' +
    '</form></section>'
}

function renderAdminPanel(userOpts) {
  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Admin</h2></header><div class="p-4 space-y-3"><div><label class="block text-xs font-medium text-stone-600 mb-1">Reassign owner</label><select data-action="reassign-owner" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"><option value="">Unassigned</option>' + userOpts + '</select></div></div></section>'
}

function renderNotEligiblePanel(s) {
  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200 flex items-center justify-between"><h2 class="text-sm font-semibold text-stone-900">Not Eligible</h2>' + (s.not_eligible ? '<span class="text-[10px] font-semibold uppercase tracking-wider text-rose-600 bg-rose-50 px-2 py-0.5 rounded">Flagged</span>' : '') + '</header><div class="p-4">' + (s.not_eligible ? '<div class="text-sm text-stone-700 mb-1">Reason: <span class="font-medium">' + esc(s.not_eligible_reason || '—') + '</span></div><div class="text-xs text-stone-400">Flagged by ' + esc(userName(s.not_eligible_flagged_by) || 'unknown') + ' on ' + esc(fmtDateOnly(s.not_eligible_flagged_at) || '?') + '</div><button data-action="clear-not-eligible" class="mt-3 text-xs text-stone-600 hover:text-stone-900 border border-stone-200 hover:border-stone-400 px-2.5 py-1 rounded-md">Clear flag</button>' : '<div class="space-y-2"><input type="text" id="not-eligible-reason" placeholder="Reason (required)" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"><button data-action="set-not-eligible" class="w-full text-sm text-rose-600 hover:text-rose-800 border border-rose-200 hover:border-rose-400 hover:bg-rose-50 py-1.5 rounded-md font-medium transition">Mark as Not Eligible</button></div>') + '</div></section>'
}

function renderWebinarDatesSection() {
  const dates = state.webinarDates || []
  if (dates.length === 0) return ''
  const rows = dates.map(d => {
    const isPast = d.webinar_date < todayYMD()
    return '<div class="py-2 border-b border-stone-100 last:border-0 flex items-center justify-between"><div><div class="text-sm font-medium ' + (isPast ? 'text-stone-400' : 'text-stone-900') + '">' + esc(fmtDateOnly(d.webinar_date)) + (d.webinar_time ? ' · ' + esc(d.webinar_time.slice(0,5)) : '') + (isPast ? ' <span class="text-xs text-stone-400">(past)</span>' : ' <span class="text-xs text-emerald-600 font-semibold">Upcoming</span>') + '</div><div class="text-xs text-stone-400 mt-0.5">Added by ' + esc(userName(d.created_by) || '—') + '</div></div></div>'
  }).join('')
  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Webinar dates <span class="text-stone-400 font-normal">(' + dates.length + ')</span></h2></header><div class="p-4">' + rows + '</div></section>'
}

function renderSchoolFields(s, editable) {
  const fieldRow = (label, value) => '<div class="py-2 grid grid-cols-3 gap-3 border-b border-stone-100 last:border-0"><dt class="text-xs uppercase tracking-wider font-medium">' + esc(label) + '</dt><dd class="col-span-2 text-sm">' + (value ? esc(value) : '<span class="text-stone-300">—</span>') + '</dd></div>'
  const cleanPhone = (n) => {
    if (!n) return null
    const d = String(n).replace(/\D/g, '')
    if (!d) return null
    if (d.length === 10) return '+91' + d
    if (d.length === 12 && d.startsWith('91')) return '+' + d
    if (d.length > 10) return '+' + d
    return null
  }
  const phoneActions = (num) => {
    const c = cleanPhone(num); if (!c) return ''
    return '<a href="tel:' + c + '" class="text-xs font-medium text-blue-600 hover:underline">📞 Call</a><a href="sms:' + c + '" class="text-xs font-medium text-stone-600 hover:underline">💬 SMS</a><a href="https://wa.me/' + c.replace('+','') + '" target="_blank" rel="noopener" class="text-xs font-medium text-emerald-600 hover:underline">🟢 WhatsApp</a>'
  }
  const phoneRow = (label, num) => {
    if (!num) return fieldRow(label, '')
    return '<div class="py-2 grid grid-cols-3 gap-3 border-b border-stone-100 last:border-0"><dt class="text-xs uppercase tracking-wider font-medium">' + esc(label) + '</dt><dd class="col-span-2 text-sm flex flex-wrap items-center gap-x-3 gap-y-1"><span>' + esc(num) + '</span>' + phoneActions(num) + '</dd></div>'
  }
  const emailRow = (label, em) => {
    if (!em) return fieldRow(label, '')
    return '<div class="py-2 grid grid-cols-3 gap-3 border-b border-stone-100 last:border-0"><dt class="text-xs uppercase tracking-wider font-medium">' + esc(label) + '</dt><dd class="col-span-2 text-sm"><a href="mailto:' + esc(em) + '" class="text-indigo-600 hover:underline break-all">' + esc(em) + '</a></dd></div>'
  }
  const pocBlock = (n) => {
    const name = s['poc' + n + '_name'], des = s['poc' + n + '_designation'], em = s['poc' + n + '_email'], num = s['poc' + n + '_number']
    if (!name && !em && !num && !des) return ''
    const emailLink = em ? '<a href="mailto:' + esc(em) + '" class="text-indigo-600 hover:underline break-all">' + esc(em) + '</a>' : ''
    const phoneText = num ? '<span class="text-stone-600">' + esc(num) + '</span>' : ''
    const sep = emailLink && phoneText ? '<span class="text-stone-300">·</span>' : ''
    return '<div class="text-sm mb-3 pb-3 border-b border-stone-100 last:border-0 last:mb-0 last:pb-0"><div class="font-medium text-stone-800">' + esc(name || '—') + (des ? ' · ' + esc(des) : '') + '</div><div class="text-xs mt-1 flex flex-wrap items-center gap-x-2 gap-y-1">' + emailLink + sep + phoneText + '</div>' + (num ? '<div class="mt-1.5 flex flex-wrap gap-x-3 gap-y-1">' + phoneActions(num) + '</div>' : '') + '</div>'
  }
  const hasPoc = s.poc1_name || s.poc1_email || s.poc1_number || s.poc2_name
  const sourceOwnerName = userName(s.created_by)
  const ownershipBlock = '<div class="mb-4 pb-4 border-b border-stone-100 grid grid-cols-2 gap-4"><div><div class="text-xs uppercase tracking-wider font-medium text-stone-400 mb-1">Source Owner</div><div class="flex items-center gap-2">' + (s.created_by ? avatar(s.created_by, 'sm') + '<span class="text-sm text-stone-700">' + esc(sourceOwnerName || '—') + '</span>' : '<span class="text-sm text-stone-400">—</span>') + '</div></div><div><div class="text-xs uppercase tracking-wider font-medium text-stone-400 mb-1">Current Owner</div><div class="flex items-center gap-2">' + (s.owner_user_id ? avatar(s.owner_user_id, 'sm') + '<span class="text-sm text-stone-700">' + esc(userName(s.owner_user_id) || '—') + '</span>' : '<span class="text-sm text-stone-400">Unassigned</span>') + '</div></div></div>'
  return '<section class="bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200 flex items-center justify-between"><h2 class="text-sm font-semibold text-stone-900">School details</h2>' + (editable ? '<button data-action="enter-edit-mode" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">Edit</button>' : '<span class="text-xs text-stone-400">Read-only</span>') + '</header><div class="p-4">' + ownershipBlock + '<dl class="field-grid">' + fieldRow('Address', s.address) + fieldRow('Pin code', s.pin_code) + emailRow('Email', s.email) + phoneRow('Phone', s.phone_no) + fieldRow('Curriculum', s.curriculum_followed) + fieldRow('Fees', s.school_fees ? s.school_fees + (s.school_fees_range ? ' (' + s.school_fees_range + ')' : '') : '') + fieldRow('School type', s.school_type) + '</dl>' + (hasPoc ? '<div class="mt-4 pt-4 border-t border-stone-200"><div class="text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Points of contact</div>' + pocBlock(1) + pocBlock(2) + '</div>' : '') + '</div></section>'
}

function renderSchoolEditForm(s) {
  const field = (label, name, type, opts) => {
    opts = opts || {}
    const val = s[name] || ''
    const cls = opts.colSpan || ''
    const tag = type === 'textarea'
      ? '<textarea name="' + name + '" rows="2" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring">' + esc(val) + '</textarea>'
      : '<input type="' + (type || 'text') + '" name="' + name + '" value="' + esc(val) + '" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring">'
    return '<div class="' + cls + '"><label class="block text-xs font-medium text-stone-600 mb-1">' + esc(label) + '</label>' + tag + '</div>'
  }

function renderFollowUps() {
  const today = todayYMD()
  const counts = state.followUpsCounts
  const items = state.followUps

  const kpiCard = (label, value, key, accent) => {
    const active = state.followUpsFilter === key
    return '<button data-action="set-fu-filter" data-filter="' + key + '" class="text-left bg-white border rounded-lg p-4 transition ' + (active ? 'border-indigo-500 ring-2 ring-indigo-100' : 'border-stone-200 hover:border-stone-300') + '"><div class="text-xs font-medium uppercase tracking-wider text-stone-500">' + esc(label) + '</div><div class="text-2xl font-semibold mt-1 ' + accent + '">' + value.toLocaleString() + '</div></button>'
  }

  let ownerOptions
  if (isAdmin()) {
    ownerOptions = '<option value="mine"' + (state.followUpsOwnerFilter === 'mine' ? ' selected' : '') + '>Just mine</option>'
      + '<option value=""' + (state.followUpsOwnerFilter === '' ? ' selected' : '') + '>All team</option>'
      + state.users.map(u => u.user_id === state.session.user.id ? '' : '<option value="' + esc(u.user_id) + '"' + (state.followUpsOwnerFilter === u.user_id ? ' selected' : '') + '>' + esc(u.full_name || u.email) + '</option>').join('')
  } else {
    ownerOptions = '<option value="mine" selected>Just mine</option>'
  }

  let listHtml
  if (items.length === 0) {
    const msg = state.followUpsFilter === 'closed' ? 'No closed tasks this month.' : state.followUpsFilter === 'today' ? 'No tasks due today.' : 'No tasks here. Nice work.'
    listHtml = '<div class="bg-white border border-stone-200 rounded-lg px-6 py-12 text-center"><div class="text-base font-medium text-stone-700">All clear</div><div class="text-sm text-stone-500 mt-1">' + msg + '</div></div>'
  } else if (state.followUpsFilter === 'closed') {
    listHtml = '<section class="bg-white border border-stone-200 rounded-lg overflow-hidden"><ul class="divide-y divide-stone-100">' + items.map(f => renderFollowUpItem(f, today)).join('') + '</ul></section>'
  } else {
    const groups = { overdue: [], today: [], upcoming: [] }
    for (const f of items) {
      if (!f.scheduled_for) continue
      if (f.scheduled_for < today) groups.overdue.push(f)
      else if (f.scheduled_for === today) groups.today.push(f)
      else groups.upcoming.push(f)
    }
    const grp = (title, arr, dot) => arr.length === 0 ? '' : '<section class="bg-white border border-stone-200 rounded-lg overflow-hidden"><header class="px-4 py-3 border-b border-stone-200 flex items-center justify-between"><h2 class="text-sm font-semibold text-stone-900">' + title + ' <span class="text-stone-400 font-normal">(' + arr.length + ')</span></h2><span class="w-2 h-2 rounded-full ' + dot + '"></span></header><ul class="divide-y divide-stone-100">' + arr.map(f => renderFollowUpItem(f, today)).join('') + '</ul></section>'
    listHtml = grp('Overdue', groups.overdue, 'bg-rose-500') + grp('Due today', groups.today, 'bg-amber-500') + grp('Upcoming', groups.upcoming, 'bg-stone-300')
  }

  const subtitle = isAdmin() ? 'Tasks across the team. Click a card to switch view.' : 'Your open tasks. Each one stays open until you log an activity.'

  return '<div class="mb-5"><h1 class="text-xl font-semibold tracking-tight text-stone-900">Follow-ups</h1><p class="text-sm text-stone-500 mt-0.5">' + subtitle + '</p></div>'
    + '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-5 max-w-3xl">'
    + kpiCard('Open', counts.open || 0, 'open', 'text-stone-900')
    + kpiCard('Today', counts.today || 0, 'today', (counts.today || 0) > 0 ? 'text-amber-600' : 'text-stone-900')
    + kpiCard('Overdue', counts.overdue || 0, 'overdue', (counts.overdue || 0) > 0 ? 'text-rose-600' : 'text-stone-900')
    + kpiCard('Closed this month', counts.closed_7d || 0, 'closed', 'text-emerald-700')
    + '</div>'
    + '<div class="mb-5 flex items-center gap-3"><label class="text-xs font-medium text-stone-600 uppercase tracking-wider">Agent</label><select data-action="fu-owner-change" class="text-sm px-3 py-1.5 border border-stone-200 rounded-md bg-white focus-ring"' + (isAdmin() ? '' : ' disabled') + '>' + ownerOptions + '</select></div>'
    + '<div class="space-y-6 max-w-3xl">' + listHtml + '</div>'
}

function renderFollowUpItem(f, today) {
  const typeStyle = ACTIVITY_TYPE_COLORS[f.activity_type] || ACTIVITY_TYPE_COLORS['Other']
  const sch = f.school || {}
  const isClosed = !!f.completed_at
  const isOverdue = !isClosed && f.scheduled_for < today
  const isToday = !isClosed && f.scheduled_for === today
  let dateText, dateCls
  if (isClosed) { dateText = 'Closed ' + fmtDate(f.completed_at); dateCls = 'text-emerald-700' }
  else if (isOverdue) { dateText = 'Overdue · ' + fmtDateOnly(f.scheduled_for); dateCls = 'text-rose-600 font-medium' }
  else if (isToday) { dateText = 'Today · ' + fmtDateOnly(f.scheduled_for); dateCls = 'text-amber-700 font-medium' }
  else { dateText = fmtDateOnly(f.scheduled_for); dateCls = 'text-stone-500' }
  const ownerChip = isAdmin() ? '<div class="text-xs text-stone-500 mt-1 flex items-center gap-1.5">' + avatar(f.user_id, 'xs') + esc(userName(f.user_id) || '—') + '</div>' : ''
  const cta = !isClosed ? '<div class="text-xs text-indigo-600 mt-2">Open school to log activity →</div>' : ''
  const outcome = isClosed && f.outcome ? '<div class="text-sm text-stone-700 mt-1">' + esc(f.outcome) + '</div>' : ''
  return '<li><a href="#/schools/' + esc(sch.school_profile_id) + '" class="block px-4 py-3 hover:bg-stone-50 transition"><div class="flex items-start gap-3"><span class="w-2 h-2 rounded-full ' + typeStyle.dot + ' mt-1.5 shrink-0"></span><div class="flex-1 min-w-0"><div class="flex items-center justify-between gap-3 flex-wrap"><span class="font-medium text-stone-900 truncate">' + esc(sch.school_name || 'School') + '</span><div class="text-xs ' + dateCls + '">' + esc(dateText) + '</div></div><div class="text-xs text-stone-500 mt-0.5">' + esc(f.activity_type) + (sch.city ? ' · ' + esc(sch.city) : '') + (sch.stage_sub ? ' · ' + esc(sch.stage_sub) : '') + '</div>' + outcome + ownerChip + cta + '</div></div></a></li>'
}

      '<section class="lg:col-span-2 bg-white border border-stone-200 rounded-lg"><header class="px-4 py-3 border-b border-stone-200"><h2 class="text-sm font-semibold text-stone-900">Activity over last 30 days</h2></header><div class="p-4"><div style="position:relative; height:260px;"><canvas id="chart-activity"></canvas></div></div></section>' +

function destroyCharts() {
  for (const k in state.chartInstances) {
    try { state.chartInstances[k].destroy() } catch (e) {}
  }
  state.chartInstances = {}
}

// Register the datalabels plugin once
if (window.ChartDataLabels && window.Chart) {
  try { Chart.register(ChartDataLabels) } catch(e) {}
}

function initDashboardCharts() {
  if (!state.dashboardData) return
  destroyCharts()
  const stageGroups = state.dashboardData.stage_groups || {}
  const stageLabels = STAGE_GROUPS.filter(g => stageGroups[g])
  const stageData = stageLabels.map(g => stageGroups[g])
  const stageColors = stageLabels.map(g => {
    return STAGE_GROUP_STYLES[g]?.bg || '#94A3B8'
  })

  const stagesEl = document.getElementById('chart-stages')
  if (stagesEl) {
    state.chartInstances.stages = new Chart(stagesEl, {
      type: 'bar',
      data: { labels: stageLabels, datasets: [{ data: stageData, backgroundColor: stageColors, borderRadius: 4, borderSkipped: false }] },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1C1917' }, datalabels: { anchor: 'end', align: 'end', color: '#44403C', font: { size: 11, weight: '600' }, formatter: (v) => v > 0 ? v : '' } },
        scales: {
          x: { beginAtZero: true, grid: { color: '#F5F5F4' }, ticks: { color: '#78716C', font: { size: 11 } } },
          y: { grid: { display: false }, ticks: { color: '#44403C', font: { size: 11 } } }
        }
      }
    })
  }

  // Activity timeline — fill missing days
  const raw = state.dashboardData.daily_activity || []
  const byDay = {}
  raw.forEach(r => { byDay[r.day] = r.n })
  const days = []
  const counts = []
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(); dt.setDate(dt.getDate() - i)
    const ymd = dt.toISOString().slice(0,10)
    days.push(dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }))
    counts.push(byDay[ymd] || 0)
  }
  const actEl = document.getElementById('chart-activity')
  if (actEl) {
    const ctx = actEl.getContext('2d')
    const grad = ctx.createLinearGradient(0, 0, 0, 260)
    grad.addColorStop(0, 'rgba(99, 102, 241, 0.18)')
    grad.addColorStop(1, 'rgba(99, 102, 241, 0)')
    state.chartInstances.activity = new Chart(actEl, {
      type: 'line',
      data: { labels: days, datasets: [{ data: counts, borderColor: '#6366F1', backgroundColor: grad, fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 4, borderWidth: 2 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1C1917' }, datalabels: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#78716C', font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
          y: { beginAtZero: true, grid: { color: '#F5F5F4' }, ticks: { color: '#78716C', font: { size: 11 }, precision: 0 } }
        }
      }
    })
  }
}

function renderReports() {

  if (!d) return hdr + '<div class="text-stone-500 text-sm">Loading reports…</div>'

  // KPI tiles (global metrics, not date-range scoped)

  const ass = t.assigned_schools || 0
  const touched = t.touched_assigned || 0
  const untouched = t.untouched_assigned || 0

  const team = t.team_size || 1
  const assPctOfTotal = tot > 0 ? ((ass / tot) * 100).toFixed(1) : '0.0'
  const touchedPctOfAss = ass > 0 ? ((touched / ass) * 100).toFixed(1) : '0.0'
  const teamL2E = ass > 0 ? ((conv / ass) * 100).toFixed(1) : '0.0'
  const avgPerAgent = team > 0 ? Math.round(ass / team) : 0

  const tiles = '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-6">' +

    tile('Assigned', ass, assPctOfTotal + '% of total') +
    tile('Touched', touched, touchedPctOfAss + '% of assigned') +

async function setNotEligible() {
  const reason = document.getElementById('not-eligible-reason')?.value?.trim()
  if (!reason) { flash('err', 'Enter a reason before flagging.'); return }
  const { error } = await supabase.from('schools').update({
    not_eligible: true, not_eligible_reason: reason,
    not_eligible_flagged_by: state.session.user.id,
    not_eligible_flagged_at: new Date().toISOString(),
  }).eq('school_profile_id', state.currentSchool.school_profile_id)
  if (error) { flash('err', error.message); return }
  await loadSchool(state.currentSchool.school_profile_id)
  flash('ok', 'School marked as Not Eligible'); render()
}

async function clearNotEligible() {
  const { error } = await supabase.from('schools').update({
    not_eligible: false, not_eligible_reason: null,
    not_eligible_flagged_by: null, not_eligible_flagged_at: null,
  }).eq('school_profile_id', state.currentSchool.school_profile_id)
  if (error) { flash('err', error.message); return }
  await loadSchool(state.currentSchool.school_profile_id)
  flash('ok', 'Not Eligible flag cleared'); render()
}

function updateSubStageOptions(group) {
  const subSel = document.getElementById('act-stage-sub')
  if (!subSel) return
  const subs = STAGE_SUBS[group] || (state.currentSchool ? STAGE_SUBS[state.currentSchool.stage_group] || [] : [])
  subSel.innerHTML = '<option value="">Keep current</option>' + subs.map(s => '<option value="' + esc(s) + '">' + esc(s) + '</option>').join('')
  toggleActivityFormFields()
}

function toggleActivityFormFields() {
  const groupSel = document.getElementById('act-stage-group')
  const subSel   = document.getElementById('act-stage-sub')
  if (!groupSel || !subSel) return
  const group = groupSel.value || (state.currentSchool?.stage_group || '')
  const sub   = subSel.value   || (state.currentSchool?.stage_sub   || '')

  const noFollowup = NO_FOLLOWUP_SUBS.includes(sub) || group === 'Exhausted' || (state.currentSchool?.not_eligible)
  const fu = document.getElementById('followup-date-row')
  if (fu) fu.style.display = noFollowup ? 'none' : ''

  const wd = document.getElementById('webinar-date-row')
  if (wd) wd.style.display = sub === 'Confirm' ? '' : 'none'

  const ni = document.getElementById('ni-reason-row')
  if (ni) ni.style.display = sub === 'Not Interested' ? '' : 'none'

  const ex = document.getElementById('exam-row')
  if (ex) ex.style.display = sub === 'Not Interested' ? '' : 'none'

  const va = document.getElementById('vacation-row')
  if (va) va.style.display = sub === 'Not Interested' ? '' : 'none'
}

function toggleNiOther() {
  const sel = document.getElementById('ni-reason-sel')
  const oth = document.getElementById('ni-reason-other')
  if (sel && oth) oth.style.display = sel.value === 'Others' ? '' : 'none'
}

window.updateSubStageOptions = updateSubStageOptions
window.toggleActivityFormFields = toggleActivityFormFields
window.toggleNiOther = toggleNiOther

let searchDebounce = null
function attachHandlers() {
  const root = document.getElementById('app')

  root.onclick = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    const action = el.dataset.action
    const id = el.dataset.id
    if (action === 'open-school' && e.target.closest('[data-no-row-click], button, input, label, select, a')) return
    if (action === 'login') { e.preventDefault(); login(); return }
    if (action === 'logout') { e.preventDefault(); logout(); return }
    if (action === 'open-school') { window.location.hash = '#/schools/' + encodeURIComponent(id); return }
    if (action === 'clear-filters') { state.filters = { search:'', stageGroup:'', stageSub:'', ownerId:'', mineOnly:false, country:'', state_:'', city:'', createdFrom:'', createdTo:'' }; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'toggle-mine') { state.filters.mineOnly = !state.filters.mineOnly; if (state.filters.mineOnly) state.filters.ownerId = ''; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'page-prev') { state.schoolsPage = Math.max(1, state.schoolsPage - 1); state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'page-next') { state.schoolsPage += 1; state.selectedSchoolIds.clear(); loadSchools().then(render); return }
    if (action === 'take-ownership') { takeOwnership(); return }
    if (action === 'set-not-eligible') { setNotEligible(); return }
    if (action === 'clear-not-eligible') { clearNotEligible(); return }
    if (action === 'enter-edit-mode') { state.editingSchool = true; render(); return }
    if (action === 'cancel-edit-school') { state.editingSchool = false; render(); return }
    if (action === 'clear-selection') { state.selectedSchoolIds.clear(); render(); return }
    if (action === 'bulk-delete-confirm') { state.bulkPanel = 'delete-confirm'; render(); return }
    if (action === 'cancel-bulk' || action === 'close-modal') { state.bulkPanel = null; render(); return }
    if (action === 'bulk-delete-execute') { bulkDelete(); return }
    if (action === 'start-complete-followup') { state.followUpsCompleting = Number(id); render(); return }
    if (action === 'cancel-complete-followup') { state.followUpsCompleting = null; render(); return }
    if (action === 'toggle-sidebar') { state.sidebarOpen = !state.sidebarOpen; render(); return }
    if (action === 'set-role') { setUserRole(id, el.dataset.role); return }
    if (action === 'set-fu-filter') {
      state.followUpsFilter = el.dataset.filter
      loadFollowUpsView().then(render)
      return
    }
    if (action === 'export-csv') { exportSchoolsCsv(); return }
    if (action === 'toggle-audit-log') {
      state.auditLogOpen = !state.auditLogOpen
      if (state.auditLogOpen && state.currentSchool) {
        loadAuditLog(state.currentSchool.school_profile_id).then(render)
      } else {
        render()
      }
      return
    }
  }

  root.onsubmit = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    e.preventDefault()
    const action = el.dataset.action
    if (action === 'submit-activity') return submitActivity(el)
    if (action === 'submit-new-school') return submitNewSchool(el)
    if (action === 'save-school-edits') return saveSchoolEdits(el)
    if (action === 'submit-complete-followup') return completeFollowUp(el.dataset.id, el)
  }

  root.oninput = (e) => {
    // New school form cascade: country → state → city
    if (state.view === 'school-new') {
      const t = e.target
      if (t.tagName === 'INPUT' && t.name === 'country') {
        const dl = document.getElementById('dl-state')
        if (dl) {
          const arr = state.filterOptions?.states_by_country?.[t.value] || state.filterOptions?.states || []
          dl.innerHTML = arr.map(s => '<option value="' + esc(s) + '">').join('')
        }
      }
      if (t.tagName === 'INPUT' && t.name === 'state') {
        const dl = document.getElementById('dl-city')
        if (dl) {
          const arr = state.filterOptions?.cities_by_state?.[t.value] || state.filterOptions?.cities || []
          dl.innerHTML = arr.map(c => '<option value="' + esc(c) + '">').join('')
        }
      }
    }
    const el = e.target.closest('[data-action]')
    if (!el) return
    const action = el.dataset.action
    if (action === 'filter-search-input') {
      clearTimeout(searchDebounce)
      searchDebounce = setTimeout(() => {
        state.filters.search = el.value
        state.schoolsPage = 1; state.selectedSchoolIds.clear()
        loadSchools().then(render)
      }, 250)
    }
    if (action === 'bulk-delete-input') {
      const ok = el.value.trim() === 'delete ' + state.selectedSchoolIds.size
      const btn = document.getElementById('bulk-delete-execute')
      if (btn) btn.disabled = !ok
    }
    if (action === 'reports-from-change') {
      state.reportsFrom = el.value
      loadReports().then(() => { render(); initReportsCharts() })
      return
    }
    if (action === 'reports-to-change') {
      state.reportsTo = el.value
      loadReports().then(() => { render(); initReportsCharts() })
      return
    }
  }

  root.onchange = (e) => {
    const el = e.target.closest('[data-action]')
    if (!el) return
    const action = el.dataset.action
    if (action === 'filter-stage-group-change') { state.filters.stageGroup = el.value; state.filters.stageSub = ''; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-stage-sub-change') { state.filters.stageSub = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-owner-change') { state.filters.ownerId = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-country-change') { state.filters.country = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-state-change') { state.filters.state_ = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-city-change') { state.filters.city = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-createdfrom-change') { state.filters.createdFrom = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'filter-createdto-change') { state.filters.createdTo = el.value; state.schoolsPage = 1; state.selectedSchoolIds.clear(); loadSchools().then(render) }
    if (action === 'reassign-owner') { reassignOwner(el.value) }
    if (action === 'toggle-select') { const id = el.dataset.id; if (el.checked) state.selectedSchoolIds.add(id); else state.selectedSchoolIds.delete(id); render() }
    if (action === 'toggle-select-all') { if (el.checked) state.schools.forEach(s => state.selectedSchoolIds.add(s.school_profile_id)); else state.schools.forEach(s => state.selectedSchoolIds.delete(s.school_profile_id)); render() }
    if (action === 'bulk-reassign-change') { const v = el.value; if (v === '') return; if (v === 'UNASSIGN') bulkReassign(null); else bulkReassign(v) }
    if (action === 'fu-owner-change') {
      state.followUpsOwnerFilter = el.value
      loadFollowUpsView().then(render)
    }
  }
}

async function handleRoute() {
  state.sidebarOpen = false
  if (!state.session) { state.view = 'login'; render(); return }
  destroyCharts()
  const hash = window.location.hash.slice(1) || '/'
  state.editingSchool = false; state.followUpsCompleting = null; state.auditLogOpen = false
  if (hash === '/' || hash === '/schools') {
    state.view = 'schools-list'; render()
    await loadSchools(); render()
  } else if (hash === '/schools/new') {
    state.view = 'school-new'; render()
  } else if (hash.startsWith('/schools/')) {
    const id = decodeURIComponent(hash.split('/')[2])
    state.view = 'school-detail'; state.currentSchool = null; state.activities = []; state.auditLog = []; state.webinarDates = []
    render()
    await Promise.all([loadSchool(id), loadActivities(id), loadWebinarDates(id)])
    render()
  } else if (hash === '/follow-ups') {
    state.view = 'follow-ups'; render()
    await Promise.all([loadMyOverdueCount(), loadFollowUpsView()]); render()
  } else if (hash === '/team') {
    if (!isAdmin()) { window.location.hash = '#/schools'; return }
    state.view = 'team'; render()
    await Promise.all([loadUsers(), loadSchoolCountsByOwner()])
    render()
  } else if (hash === '/reports') {
    if (!isAdmin()) { window.location.hash = '#/schools'; return }
    state.view = 'reports'; render()
    await loadReports(); render()
    initReportsCharts()
  } else {
    window.location.hash = '#/schools'
  }
}

async function init() {
  render()
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    state.session = session
    await Promise.all([loadProfile(), loadUsers(), loadMyOverdueCount(), loadFilterOptions()])
  }
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') {
      state.session = session
      await Promise.all([loadProfile(), loadUsers(), loadMyOverdueCount(), loadFilterOptions()])
      handleRoute()
    } else if (event === 'SIGNED_OUT') {
      state.session = null; state.profile = null; state.view = 'login'; render()
    }
  })
  window.addEventListener('hashchange', handleRoute)
  handleRoute()
}
init()
</script>

</html>
