<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Multi-User CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-slate-100 min-h-screen">

    <div id="authScreen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl w-full max-w-sm text-center">
            <h1 class="text-xl font-bold mb-6">Webinar Ops Portal</h1>
            <button id="signInBtn" class="bg-blue-600 hover:bg-blue-500 w-full py-3 rounded-xl font-medium">Sign In with BrightChamps</button>
            <div id="authMessage" class="mt-4 text-xs text-red-400"></div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden flex min-h-screen">
        <aside class="w-64 bg-slate-950 border-r border-slate-800 p-6">
            <nav class="space-y-2">
                <button onclick="switchTab('log-tab')" class="w-full text-left p-3 bg-blue-600 rounded-xl">Pipeline Register</button>
                <button onclick="switchTab('audit-tab')" class="w-full text-left p-3 hover:bg-slate-900 rounded-xl">System Audit Logs</button>
                <button onclick="switchTab('analytics-tab')" class="w-full text-left p-3 hover:bg-slate-900 rounded-xl">Analytics</button>
            </nav>
        </aside>
        
        <main class="flex-1 p-8">
            <div id="log-tab" class="tab-content space-y-6">
                <form id="outreachForm" onsubmit="handleFormSubmit(event)" class="grid grid-cols-4 gap-4">
                    <input type="text" id="schoolName" placeholder="School Name" class="bg-slate-900 border border-slate-800 p-3 rounded-xl" required>
                    <input type="text" id="contactInfo" placeholder="Contact" class="bg-slate-900 border border-slate-800 p-3 rounded-xl" required>
                    <select id="status" class="bg-slate-900 border border-slate-800 p-3 rounded-xl">
                        <option value="New Lead">New Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Webinar Agreed">Webinar Agreed</option>
                    </select>
                    <button type="submit" id="submitBtn" class="bg-blue-600 p-3 rounded-xl">Append Record</button>
                </form>
                <table class="w-full bg-slate-950 border border-slate-800 rounded-xl">
                    <tbody id="dataTableBody"></tbody>
                </table>
            </div>

            <div id="audit-tab" class="tab-content hidden">
                <div id="auditTerminal" class="bg-slate-950 border border-slate-800 p-6 rounded-2xl font-mono text-xs text-emerald-400 h-[500px] overflow-y-auto"></div>
            </div>

            <div id="analytics-tab" class="tab-content hidden">
                <div class="h-64"><canvas id="pipelineChart"></canvas></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYpGUhW9CDWLwuj7ZHVRYFAq-37uS0flU",
            authDomain: "partnership-outreach-crm.firebaseapp.com",
            projectId: "partnership-outreach-crm",
            storageBucket: "partnership-outreach-crm.firebasestorage.app",
            messagingSenderId: "142750401110",
            appId: "1:142750401110:web:cd1a0494b731d11a2a71f7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let localLeads = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                initializeDataStreams();
            }
        });

        function initializeDataStreams() {
            const terminal = document.getElementById('auditTerminal');
            const formatTs = (ts) => (ts && ts.toDate ? ts.toDate().toLocaleTimeString() : new Date().toLocaleTimeString());

            onSnapshot(query(collection(db, "audit_logs"), orderBy("timestamp", "desc")), (snapshot) => {
                terminal.innerHTML = '';
                snapshot.docs.forEach(doc => {
                    const log = doc.data();
                    terminal.innerHTML += `<p>[${formatTs(log.timestamp)}] ${log.logText || 'Action Recorded'}</p>`;
                });
            });

            onSnapshot(query(collection(db, "leads"), orderBy("timestamp", "desc")), (snapshot) => {
                localLeads = snapshot.docs.map(d => d.data());
                const tbody = document.getElementById('dataTableBody');
                tbody.innerHTML = '';
                localLeads.forEach(lead => {
                    tbody.innerHTML += `<tr class="border-b border-slate-800"><td class="p-4">${lead.school}</td><td class="p-4">${lead.status}</td></tr>`;
                });
            });
        }

        window.handleFormSubmit = async (e) => {
            e.preventDefault();
            const school = document.getElementById('schoolName').value;
            await addDoc(collection(db, "leads"), { school, status: 'New Lead', timestamp: serverTimestamp() });
            await addDoc(collection(db, "audit_logs"), { logText: `Added: ${school}`, timestamp: serverTimestamp() });
            document.getElementById('outreachForm').reset();
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        document.getElementById('signInBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
