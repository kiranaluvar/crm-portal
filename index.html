<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinar Partnership CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    body { background: #FAFAF9; color: #1C1917; font-feature-settings: "cv11", "ss01", "ss03"; }
    .focus-ring:focus { outline: 2px solid #4F46E5; outline-offset: 2px; }
    .stage-pill { display: inline-flex; align-items: center; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 4px; letter-spacing: 0.01em; }
    .skel { background: linear-gradient(90deg, #F5F5F4 25%, #EEEEEC 50%, #F5F5F4 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
    @media (prefers-reduced-motion: reduce) {
      .skel { animation: none; }
    }
    .scroll-shadow { background:
      linear-gradient(white 30%, rgba(255,255,255,0)),
      linear-gradient(rgba(255,255,255,0), white 70%) 0 100%,
      radial-gradient(50% 0, farthest-side, rgba(0,0,0,0.1), rgba(0,0,0,0)),
      radial-gradient(50% 100%, farthest-side, rgba(0,0,0,0.1), rgba(0,0,0,0)) 0 100%;
      background-repeat: no-repeat;
      background-size: 100% 40px, 100% 40px, 100% 14px, 100% 14px;
      background-attachment: local, local, scroll, scroll;
    }
  </style>
</head>
<body class="font-sans antialiased">
  <div id="app"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // ============================================================
    // CONFIG
    // ============================================================
    const SUPABASE_URL = 'https://kmojqsmfefplfkdkuahy.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_wQ9M9NiTljrd3W__mMsT0Q_IUMKrWFr'
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
    window.supabase = supabase

    const STAGES = ['New Lead','Contacted','Pitched','Agreed','Scheduled','Webinar Done','Closed','Not Interested']
    const ACTIVITY_TYPES = ['Call','Email','WhatsApp','Meeting','Other']
    const PAGE_SIZE = 50

    const STAGE_STYLES = {
      'New Lead':       'background:#F5F5F4; color:#44403C',
      'Contacted':      'background:#DBEAFE; color:#1E40AF',
      'Pitched':        'background:#E0E7FF; color:#3730A3',
      'Agreed':         'background:#D1FAE5; color:#065F46',
      'Scheduled':      'background:#FEF3C7; color:#92400E',
      'Webinar Done':   'background:#DCFCE7; color:#14532D',
      'Closed':         'background:#E7E5E4; color:#1C1917',
      'Not Interested': 'background:#FEE2E2; color:#991B1B',
    }

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      session: null,
      profile: null,            // { user_id, email, full_name, role }
      view: 'loading',
      schools: [],
      schoolsTotal: 0,
      schoolsPage: 1,
      filters: { search: '', stage: '', ownerId: '' },
      currentSchool: null,
      activities: [],
      users: [],                // all user_profiles
      saving: false,
      flash: null,              // { kind: 'ok'|'err', msg }
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function esc(s) {
      if (s === null || s === undefined) return ''
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    }
    function fmtDate(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      if (isNaN(d)) return ''
      const now = new Date()
      const sameDay = d.toDateString() === now.toDateString()
      if (sameDay) return 'Today ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      const dayMs = 24*60*60*1000
      const days = Math.floor((now - d) / dayMs)
      if (days === 1) return 'Yesterday'
      if (days >= 2 && days < 7) return days + ' days ago'
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
    }
    function fmtDateOnly(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      if (isNaN(d)) return ''
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
    }
    function stagePill(stage) {
      const style = STAGE_STYLES[stage] || STAGE_STYLES['New Lead']
      return `<span class="stage-pill" style="${style}">${esc(stage)}</span>`
    }
    function userName(userId) {
      if (!userId) return null
      const u = state.users.find(x => x.user_id === userId)
      if (!u) return null
      return u.full_name || u.email
    }
    function isAdmin() { return state.profile?.role === 'admin' }
    function canEditSchool(school) {
      return isAdmin() || (school && school.owner_user_id === state.session?.user?.id)
    }
    function flash(kind, msg) {
      state.flash = { kind, msg }
      render()
      setTimeout(() => { state.flash = null; render() }, 3500)
    }

    // ============================================================
    // DATA LOADERS
    // ============================================================
    async function loadProfile() {
      const { data, error } = await supabase
        .from('user_profiles')
        .select('user_id, email, full_name, role')
        .eq('user_id', state.session.user.id)
        .single()
      if (error) { console.error('loadProfile', error); return }
      state.profile = data
    }

    async function loadUsers() {
      const { data, error } = await supabase
        .from('user_profiles')
        .select('user_id, email, full_name, role')
        .order('full_name', { nullsFirst: false })
      if (error) { console.error('loadUsers', error); return }
      state.users = data || []
    }

    async function loadSchools() {
      const offset = (state.schoolsPage - 1) * PAGE_SIZE
      let q = supabase.from('schools')
        .select('school_profile_id, school_name, city, state, current_stage, owner_user_id, last_activity_at', { count: 'exact' })
        .order('school_name')
        .range(offset, offset + PAGE_SIZE - 1)
      if (state.filters.search) {
        const s = state.filters.search.replace(/[%_]/g, '')
        q = q.or(`school_name.ilike.%${s}%,city.ilike.%${s}%,state.ilike.%${s}%`)
      }
      if (state.filters.stage) q = q.eq('current_stage', state.filters.stage)
      if (state.filters.ownerId === 'unassigned') q = q.is('owner_user_id', null)
      else if (state.filters.ownerId) q = q.eq('owner_user_id', state.filters.ownerId)
      const { data, count, error } = await q
      if (error) { console.error('loadSchools', error); flash('err', error.message); return }
      state.schools = data || []
      state.schoolsTotal = count || 0
    }

    async function loadSchool(id) {
      const { data, error } = await supabase.from('schools').select('*').eq('school_profile_id', id).single()
      if (error) { console.error('loadSchool', error); flash('err', 'Could not load that school'); state.currentSchool = null; return }
      state.currentSchool = data
    }

    async function loadActivities(schoolId) {
      const { data, error } = await supabase.from('activities')
        .select('*')
        .eq('school_profile_id', schoolId)
        .order('created_at', { ascending: false })
        .limit(100)
      if (error) { console.error('loadActivities', error); return }
      state.activities = data || []
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    async function login() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
      })
      if (error) flash('err', error.message)
    }

    async function logout() {
      await supabase.auth.signOut()
      window.location.hash = ''
    }

    async function submitActivity(form) {
      if (state.saving) return
      state.saving = true; render()
      const type = form.activity_type.value
      const outcome = form.outcome.value.trim()
      const notes = form.notes.value.trim()
      const completed = form.completed.checked
      const scheduledFor = form.scheduled_for.value || null
      const newStage = form.new_stage.value || null

      const row = {
        school_profile_id: state.currentSchool.school_profile_id,
        user_id: state.session.user.id,
        activity_type: type,
        outcome: outcome || null,
        notes: notes || null,
        scheduled_for: scheduledFor,
        completed_at: completed ? new Date().toISOString() : null,
        stage_at_time: newStage || state.currentSchool.current_stage,
      }
      const { error: insErr } = await supabase.from('activities').insert(row)
      if (insErr) { state.saving = false; flash('err', insErr.message); render(); return }

      // Stage change (if requested and changed)
      if (newStage && newStage !== state.currentSchool.current_stage) {
        const { error: upErr } = await supabase.from('schools')
          .update({ current_stage: newStage })
          .eq('school_profile_id', state.currentSchool.school_profile_id)
        if (upErr) { state.saving = false; flash('err', 'Activity logged but stage change failed: ' + upErr.message); render(); return }
      }

      // Refresh
      await Promise.all([loadSchool(state.currentSchool.school_profile_id), loadActivities(state.currentSchool.school_profile_id)])
      state.saving = false
      flash('ok', 'Activity logged')
      render()
    }

    async function reassignOwner(newOwnerId) {
      if (!isAdmin()) return
      const { error } = await supabase.from('schools')
        .update({ owner_user_id: newOwnerId || null })
        .eq('school_profile_id', state.currentSchool.school_profile_id)
      if (error) { flash('err', error.message); return }
      await loadSchool(state.currentSchool.school_profile_id)
      flash('ok', 'Owner updated')
      render()
    }

    async function submitNewSchool(form) {
      if (state.saving) return
      state.saving = true; render()
      const row = {}
      const fields = ['school_profile_id','school_name','school_type','address','pin_code','city','state','country',
                      'email','phone_no','curriculum_followed','school_fees','school_fees_range',
                      'poc1_designation','poc1_email','poc1_name','poc1_number',
                      'poc2_designation','poc2_email','poc2_name','poc2_number']
      fields.forEach(f => {
        const v = form[f]?.value?.trim()
        if (v) row[f] = v
      })
      row.created_by = state.session.user.id
      row.owner_user_id = state.session.user.id  // creator auto-owns new school

      const { error } = await supabase.from('schools').insert(row)
      state.saving = false
      if (error) { flash('err', error.message); render(); return }
      flash('ok', 'School added')
      window.location.hash = '#/schools/' + encodeURIComponent(row.school_profile_id)
    }

    async function takeOwnership() {
      const { error } = await supabase.from('schools')
        .update({ owner_user_id: state.session.user.id })
        .eq('school_profile_id', state.currentSchool.school_profile_id)
      if (error) { flash('err', error.message); return }
      await loadSchool(state.currentSchool.school_profile_id)
      flash('ok', 'You now own this school')
      render()
    }

    // ============================================================
    // RENDERERS
    // ============================================================
    function render() {
      const root = document.getElementById('app')
      let html = ''
      if (state.view === 'loading') {
        html = renderLoading()
      } else if (!state.session) {
        html = renderLogin()
      } else {
        html = renderShell()
      }
      root.innerHTML = html
      attachDelegatedHandlers()
    }

    function renderLoading() {
      return `<div class="min-h-screen flex items-center justify-center text-stone-500">Loading…</div>`
    }

    function renderLogin() {
      return `
        <div class="min-h-screen flex items-center justify-center px-4">
          <div class="max-w-sm w-full">
            <div class="mb-8">
              <div class="text-xs font-semibold tracking-widest text-indigo-600 uppercase mb-3">BrightChamps · Partnerships</div>
              <h1 class="text-3xl font-semibold tracking-tight text-stone-900 mb-2">Webinar CRM</h1>
              <p class="text-sm text-stone-500">Sign in with your brightchamps.com account to continue.</p>
            </div>
            <button data-action="login" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition focus-ring flex items-center justify-center gap-2">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff" opacity=".95"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff" opacity=".9"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff" opacity=".85"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff" opacity=".95"/></svg>
              Sign in with Google
            </button>
            <p class="text-xs text-stone-400 mt-6">Access restricted to brightchamps.com Workspace.</p>
          </div>
        </div>
      `
    }

    function renderShell() {
      const content = renderCurrentView()
      const flashHtml = state.flash ? `
        <div class="fixed top-4 right-4 z-50 px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium ${state.flash.kind === 'ok' ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white'}">
          ${esc(state.flash.msg)}
        </div>` : ''
      return `
        ${flashHtml}
        <div class="min-h-screen flex">
          ${renderSidebar()}
          <div class="flex-1 ml-56 flex flex-col">
            ${renderTopbar()}
            <main class="flex-1 px-8 py-6 max-w-[1400px] w-full">
              ${content}
            </main>
          </div>
        </div>
      `
    }

    function renderSidebar() {
      const item = (label, hash, active) => `
        <a href="#${hash}" class="block px-3 py-2 rounded-md text-sm ${active ? 'bg-stone-100 text-stone-900 font-medium' : 'text-stone-600 hover:bg-stone-50 hover:text-stone-900'}">
          ${esc(label)}
        </a>`
      const hash = window.location.hash.slice(1) || '/'
      const onSchools = hash === '/' || hash.startsWith('/schools')
      return `
        <aside class="fixed left-0 top-0 bottom-0 w-56 border-r border-stone-200 bg-white px-4 py-5 flex flex-col">
          <div class="px-3 mb-6">
            <div class="text-xs font-semibold tracking-widest text-indigo-600 uppercase">BrightChamps</div>
            <div class="text-base font-semibold text-stone-900 mt-0.5">Webinar CRM</div>
          </div>
          <nav class="space-y-0.5 flex-1">
            ${item('Schools', '/schools', onSchools && !hash.includes('/new'))}
            <div class="pt-4 pb-1 px-3 text-[10px] font-semibold uppercase tracking-wider text-stone-400">Coming soon</div>
            <div class="px-3 py-2 text-sm text-stone-400">My follow-ups</div>
            <div class="px-3 py-2 text-sm text-stone-400">Dashboard</div>
            <div class="px-3 py-2 text-sm text-stone-400">Team</div>
          </nav>
          <div class="border-t border-stone-200 pt-3 px-3">
            <div class="text-xs text-stone-500 truncate">${esc(state.profile?.full_name || state.session?.user?.email || '')}</div>
            <div class="flex items-center justify-between mt-1">
              <span class="text-[10px] font-semibold uppercase tracking-wider ${isAdmin() ? 'text-indigo-600' : 'text-stone-400'}">${isAdmin() ? 'Admin' : 'Agent'}</span>
              <button data-action="logout" class="text-xs text-stone-500 hover:text-stone-900">Sign out</button>
            </div>
          </div>
        </aside>
      `
    }

    function renderTopbar() {
      return `
        <header class="border-b border-stone-200 bg-white">
          <div class="px-8 py-3 flex items-center justify-between max-w-[1400px] w-full">
            <div class="text-sm text-stone-500">
              ${renderBreadcrumb()}
            </div>
            <div class="flex items-center gap-3">
              <a href="#/schools/new" class="text-sm bg-stone-900 hover:bg-stone-800 text-white px-3 py-1.5 rounded-md font-medium transition">+ Add school</a>
            </div>
          </div>
        </header>
      `
    }

    function renderBreadcrumb() {
      const hash = window.location.hash.slice(1) || '/'
      if (hash === '/schools/new') {
        return `<a href="#/schools" class="hover:text-stone-900">Schools</a> <span class="text-stone-300">/</span> <span class="text-stone-900">Add school</span>`
      }
      if (hash.startsWith('/schools/') && state.currentSchool) {
        return `<a href="#/schools" class="hover:text-stone-900">Schools</a> <span class="text-stone-300">/</span> <span class="text-stone-900">${esc(state.currentSchool.school_name)}</span>`
      }
      return `<span class="text-stone-900">Schools</span>`
    }

    function renderCurrentView() {
      switch (state.view) {
        case 'schools-list': return renderSchoolsList()
        case 'school-detail': return renderSchoolDetail()
        case 'school-new': return renderSchoolNew()
        default: return renderSchoolsList()
      }
    }

    function renderSchoolsList() {
      const totalPages = Math.max(1, Math.ceil(state.schoolsTotal / PAGE_SIZE))
      const page = state.schoolsPage
      const start = (page - 1) * PAGE_SIZE + 1
      const end = Math.min(page * PAGE_SIZE, state.schoolsTotal)

      const userOptions = state.users.map(u =>
        `<option value="${esc(u.user_id)}" ${state.filters.ownerId === u.user_id ? 'selected' : ''}>${esc(u.full_name || u.email)}</option>`).join('')

      const rows = state.schools.length === 0
        ? `<tr><td colspan="6" class="text-center text-stone-400 py-12 text-sm">No schools match these filters.</td></tr>`
        : state.schools.map(s => `
          <tr class="hover:bg-stone-50 cursor-pointer border-b border-stone-100" data-action="open-school" data-id="${esc(s.school_profile_id)}">
            <td class="py-3 px-4 font-mono text-xs text-stone-400">${esc(s.school_profile_id)}</td>
            <td class="py-3 px-4">
              <div class="font-medium text-stone-900">${esc(s.school_name)}</div>
              <div class="text-xs text-stone-500">${esc([s.city, s.state].filter(Boolean).join(', '))}</div>
            </td>
            <td class="py-3 px-4">${stagePill(s.current_stage)}</td>
            <td class="py-3 px-4 text-sm text-stone-600">${esc(userName(s.owner_user_id) || '—')}</td>
            <td class="py-3 px-4 text-sm text-stone-500">${esc(fmtDate(s.last_activity_at) || 'No activity yet')}</td>
            <td class="py-3 px-4 text-right">
              <span class="text-stone-300">›</span>
            </td>
          </tr>
        `).join('')

      return `
        <div class="mb-5">
          <h1 class="text-xl font-semibold tracking-tight text-stone-900">Schools</h1>
          <p class="text-sm text-stone-500 mt-0.5">${state.schoolsTotal.toLocaleString()} total. Click a row to open.</p>
        </div>

        <div class="bg-white border border-stone-200 rounded-lg overflow-hidden">
          <div class="px-4 py-3 border-b border-stone-200 flex flex-wrap gap-2 items-center">
            <input type="text" id="filter-search" placeholder="Search by name, city, state…" value="${esc(state.filters.search)}"
              class="flex-1 min-w-[200px] text-sm px-3 py-1.5 border border-stone-200 rounded-md focus-ring focus:border-indigo-300" data-action="filter-search-input">
            <select id="filter-stage" class="text-sm px-3 py-1.5 border border-stone-200 rounded-md bg-white focus-ring" data-action="filter-stage-change">
              <option value="">All stages</option>
              ${STAGES.map(s => `<option value="${esc(s)}" ${state.filters.stage === s ? 'selected' : ''}>${esc(s)}</option>`).join('')}
            </select>
            <select id="filter-owner" class="text-sm px-3 py-1.5 border border-stone-200 rounded-md bg-white focus-ring" data-action="filter-owner-change">
              <option value="">All owners</option>
              <option value="unassigned" ${state.filters.ownerId === 'unassigned' ? 'selected' : ''}>Unassigned</option>
              ${userOptions}
            </select>
            ${(state.filters.search || state.filters.stage || state.filters.ownerId) ? `<button data-action="clear-filters" class="text-xs text-stone-500 hover:text-stone-900 px-2">Clear</button>` : ''}
          </div>

          <table class="w-full">
            <thead class="bg-stone-50 border-b border-stone-200">
              <tr class="text-left text-xs font-medium text-stone-500 uppercase tracking-wider">
                <th class="py-2.5 px-4">ID</th>
                <th class="py-2.5 px-4">School</th>
                <th class="py-2.5 px-4">Stage</th>
                <th class="py-2.5 px-4">Owner</th>
                <th class="py-2.5 px-4">Last activity</th>
                <th class="py-2.5 px-4"></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>

          ${state.schoolsTotal > PAGE_SIZE ? `
          <div class="px-4 py-3 border-t border-stone-200 flex items-center justify-between text-sm text-stone-500">
            <div>${start.toLocaleString()}–${end.toLocaleString()} of ${state.schoolsTotal.toLocaleString()}</div>
            <div class="flex items-center gap-2">
              <button data-action="page-prev" ${page === 1 ? 'disabled' : ''} class="px-2.5 py-1 border border-stone-200 rounded hover:bg-stone-50 disabled:opacity-30 disabled:cursor-not-allowed">‹</button>
              <span>Page ${page} of ${totalPages.toLocaleString()}</span>
              <button data-action="page-next" ${page >= totalPages ? 'disabled' : ''} class="px-2.5 py-1 border border-stone-200 rounded hover:bg-stone-50 disabled:opacity-30 disabled:cursor-not-allowed">›</button>
            </div>
          </div>` : ''}
        </div>
      `
    }

    function renderSchoolDetail() {
      const s = state.currentSchool
      if (!s) {
        return `<div class="text-stone-500 text-sm">School not found. <a href="#/schools" class="text-indigo-600 hover:underline">Back to list</a></div>`
      }

      const editable = canEditSchool(s)
      const ownerName = userName(s.owner_user_id)
      const fieldRow = (label, value) => `
        <div class="py-2 grid grid-cols-3 gap-3 border-b border-stone-100 last:border-0">
          <dt class="text-xs text-stone-500 uppercase tracking-wider font-medium">${esc(label)}</dt>
          <dd class="col-span-2 text-sm text-stone-800">${value ? esc(value) : '<span class="text-stone-300">—</span>'}</dd>
        </div>`

      const activityItems = state.activities.length === 0
        ? `<div class="text-sm text-stone-400 py-8 text-center">No activities logged yet. Use the form on the left to log the first one.</div>`
        : state.activities.map(a => {
          const who = userName(a.user_id) || 'Unknown'
          const when = a.completed_at ? fmtDate(a.completed_at) : (a.scheduled_for ? 'Scheduled for ' + fmtDateOnly(a.scheduled_for) : fmtDate(a.created_at))
          const isPending = !a.completed_at
          return `
            <div class="py-3 px-3 border-l-2 ${isPending ? 'border-amber-300 bg-amber-50/40' : 'border-stone-200'} pl-4 mb-2 rounded-r">
              <div class="flex items-center justify-between flex-wrap gap-2">
                <div class="flex items-center gap-2">
                  <span class="text-xs font-semibold text-stone-700">${esc(a.activity_type)}</span>
                  ${isPending ? '<span class="text-[10px] font-semibold uppercase tracking-wider text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded">Pending</span>' : ''}
                  ${a.stage_at_time ? `<span class="text-xs text-stone-400">→ ${esc(a.stage_at_time)}</span>` : ''}
                </div>
                <div class="text-xs text-stone-400">${esc(when)} · ${esc(who)}</div>
              </div>
              ${a.outcome ? `<div class="text-sm text-stone-800 mt-1.5">${esc(a.outcome)}</div>` : ''}
              ${a.notes ? `<div class="text-sm text-stone-600 mt-1 whitespace-pre-wrap">${esc(a.notes)}</div>` : ''}
              ${a.scheduled_for && a.completed_at ? `<div class="text-xs text-stone-400 mt-1">Follow-up planned: ${esc(fmtDateOnly(a.scheduled_for))}</div>` : ''}
            </div>
          `
        }).join('')

      const userOptions = state.users.map(u =>
        `<option value="${esc(u.user_id)}" ${s.owner_user_id === u.user_id ? 'selected' : ''}>${esc(u.full_name || u.email)}</option>`).join('')

      return `
        <div class="mb-5 flex items-start justify-between gap-4">
          <div>
            <div class="text-xs text-stone-400 font-mono mb-1">ID ${esc(s.school_profile_id)}</div>
            <h1 class="text-2xl font-semibold tracking-tight text-stone-900">${esc(s.school_name)}</h1>
            <div class="text-sm text-stone-500 mt-1">${esc([s.city, s.state, s.country].filter(Boolean).join(', '))}</div>
          </div>
          <div class="flex items-center gap-2 flex-wrap justify-end">
            ${stagePill(s.current_stage)}
            ${s.owner_user_id
              ? `<span class="text-xs text-stone-500">Owner: <strong class="text-stone-800">${esc(ownerName || '—')}</strong></span>`
              : `<button data-action="take-ownership" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">Take ownership</button>`}
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

          <!-- LEFT: Log activity + School fields -->
          <div class="lg:col-span-1 space-y-6">

            <!-- Log activity -->
            <section class="bg-white border border-stone-200 rounded-lg">
              <header class="px-4 py-3 border-b border-stone-200">
                <h2 class="text-sm font-semibold text-stone-900">Log activity</h2>
              </header>
              <form id="activity-form" data-action="submit-activity" class="p-4 space-y-3">
                <div>
                  <label class="block text-xs font-medium text-stone-600 mb-1">Type</label>
                  <select name="activity_type" required class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring">
                    ${ACTIVITY_TYPES.map(t => `<option>${esc(t)}</option>`).join('')}
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-medium text-stone-600 mb-1">Outcome <span class="text-stone-400 font-normal">(short)</span></label>
                  <input type="text" name="outcome" placeholder="e.g., Spoke to principal" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring">
                </div>
                <div>
                  <label class="block text-xs font-medium text-stone-600 mb-1">Notes</label>
                  <textarea name="notes" rows="3" placeholder="Details, next steps…" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-xs font-medium text-stone-600 mb-1">Move stage to</label>
                    <select name="new_stage" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring">
                      <option value="">Keep current</option>
                      ${STAGES.map(st => `<option value="${esc(st)}" ${st === s.current_stage ? 'disabled' : ''}>${esc(st)}</option>`).join('')}
                    </select>
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-stone-600 mb-1">Next follow-up</label>
                    <input type="date" name="scheduled_for" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring">
                  </div>
                </div>
                <label class="flex items-center gap-2 text-xs text-stone-600">
                  <input type="checkbox" name="completed" checked class="rounded focus-ring">
                  This already happened (mark completed)
                </label>
                <button type="submit" ${state.saving ? 'disabled' : ''} class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white text-sm font-medium py-2 rounded-md transition">
                  ${state.saving ? 'Saving…' : 'Log activity'}
                </button>
              </form>
            </section>

            ${isAdmin() ? `
            <!-- Admin actions -->
            <section class="bg-white border border-stone-200 rounded-lg">
              <header class="px-4 py-3 border-b border-stone-200">
                <h2 class="text-sm font-semibold text-stone-900">Admin</h2>
              </header>
              <div class="p-4 space-y-3">
                <div>
                  <label class="block text-xs font-medium text-stone-600 mb-1">Reassign owner</label>
                  <select data-action="reassign-owner" class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md bg-white focus-ring">
                    <option value="">Unassigned</option>
                    ${userOptions}
                  </select>
                </div>
              </div>
            </section>` : ''}

          </div>

          <!-- RIGHT: School fields + Activity timeline -->
          <div class="lg:col-span-2 space-y-6">

            <section class="bg-white border border-stone-200 rounded-lg">
              <header class="px-4 py-3 border-b border-stone-200 flex items-center justify-between">
                <h2 class="text-sm font-semibold text-stone-900">School details</h2>
                ${editable ? '<span class="text-xs text-stone-400">Editable fields coming in next update</span>' : '<span class="text-xs text-stone-400">Read-only</span>'}
              </header>
              <div class="p-4">
                <dl>
                  ${fieldRow('Address', s.address)}
                  ${fieldRow('Pin code', s.pin_code)}
                  ${fieldRow('Email', s.email)}
                  ${fieldRow('Phone', s.phone_no)}
                  ${fieldRow('Curriculum', s.curriculum_followed)}
                  ${fieldRow('Fees', s.school_fees ? s.school_fees + (s.school_fees_range ? ' (' + s.school_fees_range + ')' : '') : '')}
                  ${fieldRow('School type', s.school_type)}
                </dl>
                ${(s.poc1_name || s.poc1_email || s.poc1_number || s.poc2_name) ? `
                <div class="mt-4 pt-4 border-t border-stone-200">
                  <div class="text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Points of contact</div>
                  ${(s.poc1_name || s.poc1_email || s.poc1_number || s.poc1_designation) ? `
                    <div class="text-sm mb-3">
                      <div class="font-medium text-stone-800">${esc(s.poc1_name || '—')}${s.poc1_designation ? ' · ' + esc(s.poc1_designation) : ''}</div>
                      <div class="text-stone-500 text-xs mt-0.5">${esc([s.poc1_email, s.poc1_number].filter(Boolean).join(' · ')) || '—'}</div>
                    </div>` : ''}
                  ${(s.poc2_name || s.poc2_email || s.poc2_number || s.poc2_designation) ? `
                    <div class="text-sm">
                      <div class="font-medium text-stone-800">${esc(s.poc2_name || '—')}${s.poc2_designation ? ' · ' + esc(s.poc2_designation) : ''}</div>
                      <div class="text-stone-500 text-xs mt-0.5">${esc([s.poc2_email, s.poc2_number].filter(Boolean).join(' · ')) || '—'}</div>
                    </div>` : ''}
                </div>` : ''}
              </div>
            </section>

            <section class="bg-white border border-stone-200 rounded-lg">
              <header class="px-4 py-3 border-b border-stone-200">
                <h2 class="text-sm font-semibold text-stone-900">Activity timeline <span class="text-stone-400 font-normal">(${state.activities.length})</span></h2>
              </header>
              <div class="p-4">
                ${activityItems}
              </div>
            </section>

          </div>
        </div>
      `
    }

    function renderSchoolNew() {
      const field = (label, name, type = 'text', opts = {}) => `
        <div class="${opts.colSpan || ''}">
          <label class="block text-xs font-medium text-stone-600 mb-1">${esc(label)}${opts.required ? ' <span class="text-rose-500">*</span>' : ''}</label>
          ${type === 'textarea'
            ? `<textarea name="${name}" rows="2" ${opts.required ? 'required' : ''} class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring"></textarea>`
            : `<input type="${type}" name="${name}" ${opts.required ? 'required' : ''} class="w-full text-sm px-2.5 py-1.5 border border-stone-200 rounded-md focus-ring">`}
        </div>
      `
      return `
        <div class="mb-5">
          <h1 class="text-xl font-semibold tracking-tight text-stone-900">Add a school</h1>
          <p class="text-sm text-stone-500 mt-0.5">You become the owner of this school once it's saved. You can reassign it later.</p>
        </div>

        <form data-action="submit-new-school" class="space-y-6 max-w-4xl">

          <section class="bg-white border border-stone-200 rounded-lg p-5">
            <h2 class="text-sm font-semibold text-stone-900 mb-4">Identity</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              ${field('School Profile ID', 'school_profile_id', 'text', { required: true })}
              ${field('School name', 'school_name', 'text', { required: true, colSpan: 'md:col-span-2' })}
              ${field('School type', 'school_type')}
              ${field('Curriculum', 'curriculum_followed')}
              ${field('Country', 'country')}
            </div>
          </section>

          <section class="bg-white border border-stone-200 rounded-lg p-5">
            <h2 class="text-sm font-semibold text-stone-900 mb-4">Location</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              ${field('Address', 'address', 'textarea', { colSpan: 'md:col-span-3' })}
              ${field('City', 'city')}
              ${field('State', 'state')}
              ${field('Pin code', 'pin_code')}
            </div>
          </section>

          <section class="bg-white border border-stone-200 rounded-lg p-5">
            <h2 class="text-sm font-semibold text-stone-900 mb-4">School contact</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${field('Email', 'email', 'email')}
              ${field('Phone', 'phone_no', 'tel')}
              ${field('Fees', 'school_fees')}
              ${field('Fees range', 'school_fees_range')}
            </div>
          </section>

          <section class="bg-white border border-stone-200 rounded-lg p-5">
            <h2 class="text-sm font-semibold text-stone-900 mb-4">Point of contact 1</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${field('Name', 'poc1_name')}
              ${field('Designation', 'poc1_designation')}
              ${field('Email', 'poc1_email', 'email')}
              ${field('Phone', 'poc1_number', 'tel')}
            </div>
          </section>

          <section class="bg-white border border-stone-200 rounded-lg p-5">
            <h2 class="text-sm font-semibold text-stone-900 mb-4">Point of contact 2 <span class="text-stone-400 font-normal text-xs">(optional)</span></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${field('Name', 'poc2_name')}
              ${field('Designation', 'poc2_designation')}
              ${field('Email', 'poc2_email', 'email')}
              ${field('Phone', 'poc2_number', 'tel')}
            </div>
          </section>

          <div class="flex items-center gap-3 sticky bottom-4 bg-white border border-stone-200 rounded-lg p-4 shadow-sm">
            <button type="submit" ${state.saving ? 'disabled' : ''} class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white text-sm font-medium px-4 py-2 rounded-md">
              ${state.saving ? 'Saving…' : 'Save school'}
            </button>
            <a href="#/schools" class="text-sm text-stone-600 hover:text-stone-900">Cancel</a>
          </div>
        </form>
      `
    }

    // ============================================================
    // EVENT DELEGATION
    // ============================================================
    let searchDebounce = null
    function attachDelegatedHandlers() {
      const root = document.getElementById('app')

      // CLICKS
      root.onclick = (e) => {
        const el = e.target.closest('[data-action]')
        if (!el) return
        const action = el.dataset.action
        const id = el.dataset.id

        if (action === 'login') { e.preventDefault(); login(); return }
        if (action === 'logout') { e.preventDefault(); logout(); return }
        if (action === 'open-school') {
          if (e.target.closest('button, select, input, a')) return
          window.location.hash = '#/schools/' + encodeURIComponent(id)
          return
        }
        if (action === 'clear-filters') {
          state.filters = { search: '', stage: '', ownerId: '' }
          state.schoolsPage = 1
          loadSchools().then(render)
          return
        }
        if (action === 'page-prev') { state.schoolsPage = Math.max(1, state.schoolsPage - 1); loadSchools().then(render); return }
        if (action === 'page-next') { state.schoolsPage = state.schoolsPage + 1; loadSchools().then(render); return }
        if (action === 'take-ownership') { takeOwnership(); return }
      }

      // SUBMITS
      root.onsubmit = (e) => {
        const el = e.target.closest('[data-action]')
        if (!el) return
        e.preventDefault()
        const action = el.dataset.action
        if (action === 'submit-activity') { submitActivity(el); return }
        if (action === 'submit-new-school') { submitNewSchool(el); return }
      }

      // INPUTS (search w/ debounce)
      root.oninput = (e) => {
        const el = e.target.closest('[data-action]')
        if (!el) return
        const action = el.dataset.action
        if (action === 'filter-search-input') {
          clearTimeout(searchDebounce)
          searchDebounce = setTimeout(() => {
            state.filters.search = el.value
            state.schoolsPage = 1
            loadSchools().then(render)
          }, 250)
        }
      }

      // CHANGES (selects)
      root.onchange = (e) => {
        const el = e.target.closest('[data-action]')
        if (!el) return
        const action = el.dataset.action
        if (action === 'filter-stage-change') {
          state.filters.stage = el.value; state.schoolsPage = 1; loadSchools().then(render)
        }
        if (action === 'filter-owner-change') {
          state.filters.ownerId = el.value; state.schoolsPage = 1; loadSchools().then(render)
        }
        if (action === 'reassign-owner') {
          reassignOwner(el.value)
        }
      }
    }

    // ============================================================
    // ROUTING
    // ============================================================
    async function handleRoute() {
      if (!state.session) { state.view = 'login'; render(); return }
      const hash = window.location.hash.slice(1) || '/'
      if (hash === '/' || hash === '/schools') {
        state.view = 'schools-list'
        render()  // initial paint with old data
        await loadSchools()
        render()
      } else if (hash === '/schools/new') {
        state.view = 'school-new'
        render()
      } else if (hash.startsWith('/schools/')) {
        const id = decodeURIComponent(hash.split('/')[2])
        state.view = 'school-detail'
        state.currentSchool = null
        state.activities = []
        render()
        await Promise.all([loadSchool(id), loadActivities(id)])
        render()
      } else {
        window.location.hash = '#/schools'
      }
    }

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
      render()  // shows loading
      const { data: { session } } = await supabase.auth.getSession()
      if (session) {
        state.session = session
        await Promise.all([loadProfile(), loadUsers()])
      }
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN') {
          state.session = session
          await Promise.all([loadProfile(), loadUsers()])
          handleRoute()
        } else if (event === 'SIGNED_OUT') {
          state.session = null
          state.profile = null
          state.view = 'login'
          render()
        }
      })
      window.addEventListener('hashchange', handleRoute)
      handleRoute()
    }
    init()
  </script>
</body>
</html>
